<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เช็คชื่อ - โรงเรียนบ้านละลม</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.5.0/dist/tabler-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Sarabun', sans-serif; }
    .status-btn { transition: all 0.1s; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-slate-50 min-h-screen">

  <div class="max-w-2xl mx-auto p-4">

    <!-- ปุ่มกลับ -->
    <a href="admin.html" class="inline-flex items-center gap-1 text-xs text-slate-500 hover:text-slate-700 mb-3">
      <i class="ti ti-arrow-left"></i> กลับ Dashboard
    </a>

    <!-- การ์ดหลัก -->
    <div class="bg-white rounded-2xl border border-slate-100 overflow-hidden">

      <!-- Header -->
      <div class="bg-gradient-to-br from-[#042C53] to-[#185FA5] p-4 text-white">
        <div class="flex items-center justify-between">
          <div>
            <p class="text-base font-medium">เช็คชื่อ Homeroom</p>
            <p id="headerInfo" class="text-xs text-blue-200 mt-1">เลือกห้องเรียน</p>
          </div>
          <div id="countBadge" class="bg-amber-400/20 text-amber-400 px-3 py-1 rounded-full text-xs font-medium hidden">0 คน</div>
        </div>
      </div>

      <!-- เลือกห้อง -->
      <div class="p-4 border-b border-slate-100">
        <label class="block text-xs font-medium text-slate-700 mb-1.5">เลือกห้องเรียน</label>
        <div class="flex gap-2">
          <select id="classSelect" class="flex-1 h-10 px-3 text-sm border border-slate-200 rounded-lg focus:border-[#185FA5] outline-none">
            <option value="">-- กำลังโหลด --</option>
          </select>
          <button onclick="loadStudents()" class="px-4 bg-[#185FA5] hover:bg-[#0C447C] text-white rounded-lg text-sm font-medium">
            <i class="ti ti-search"></i> โหลด
          </button>
        </div>
      </div>

      <!-- ปุ่มลัด -->
      <div id="quickActions" class="p-3 px-4 bg-slate-50 flex gap-2 items-center flex-wrap hidden">
        <span class="text-xs text-slate-500 mr-1">ลัด:</span>
        <button onclick="setAll('present')" class="text-xs px-3 py-1.5 bg-[#1D9E75] text-white rounded-md"><i class="ti ti-checks"></i> มาทั้งหมด</button>
        <button onclick="clearAll()" class="text-xs px-3 py-1.5 bg-white text-slate-500 border border-slate-200 rounded-md">ล้างทั้งหมด</button>
      </div>

      <!-- รายชื่อนักเรียน -->
      <div id="studentList" class="p-4 space-y-2">
        <div class="text-center text-sm text-slate-400 py-8">
          <i class="ti ti-users text-2xl block mb-2"></i>
          เลือกห้องเรียนแล้วกดโหลด เพื่อแสดงรายชื่อ
        </div>
      </div>

      <!-- Footer -->
      <div id="footer" class="p-4 border-t border-slate-100 hidden">
        <div id="summary" class="flex gap-3 text-xs flex-wrap mb-3"></div>
        <div class="flex gap-2">
          <button id="notifyBtn" onclick="sendNotify()" class="flex-1 text-sm py-2.5 bg-[#06C755] hover:bg-[#04A045] text-white rounded-lg font-medium">
            <i class="ti ti-brand-line"></i> <span id="notifyText">ส่งแจ้งผู้ปกครอง</span>
          </button>
          <button id="saveBtn" onclick="saveAttendance()" class="flex-1 text-sm py-2.5 bg-[#185FA5] hover:bg-[#0C447C] text-white rounded-lg font-medium">
            <i class="ti ti-device-floppy"></i> <span id="saveText">บันทึก</span>
          </button>
        </div>
      </div>

    </div>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbyZB1sqZKu_--r5_mwf9RCJm4u9cTjzrOMToh_ULv22lw81oRZ3U9if0YxkV_nNhWhesw/exec';

    // ตรวจ session
    const user = JSON.parse(localStorage.getItem('banlalom_user') || '{}');
    if (!user.id) window.location.href = 'login.html';

    // สถานะ 5 แบบ
    const STATUSES = [
      { key: 'present', label: 'มา', color: '#1D9E75', textColor: '#0F6E56' },
      { key: 'late', label: 'สาย', color: '#EF9F27', textColor: '#BA7517' },
      { key: 'leave_personal', label: 'ลากิจ', color: '#534AB7', textColor: '#3C3489' },
      { key: 'leave_sick', label: 'ลาป่วย', color: '#185FA5', textColor: '#185FA5' },
      { key: 'absent', label: 'ขาด', color: '#E24B4A', textColor: '#A32D2D' },
    ];

    let students = [];
    let attendance = {}; // { studentId: status }
    const today = new Date().toISOString().slice(0, 10);

    // แสดงวันที่
    const days = ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์'];
    const months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
    const now = new Date();
    const dateStr = 'วัน' + days[now.getDay()] + 'ที่ ' + now.getDate() + ' ' + months[now.getMonth()] + ' ' + (now.getFullYear()+543);

    // โหลดรายการห้อง
    async function loadClasses() {
      try {
        const res = await fetch(API_URL + '?action=getClasses');
        const data = await res.json();
        if (data.success) {
          const sel = document.getElementById('classSelect');
          const isAdmin = (user.role === 'Admin' || !user.role);

          if (isAdmin) {
            // แอดมินเห็นทุกห้อง
            sel.innerHTML = '<option value="">-- เลือกห้อง --</option>';
            data.data.forEach(c => {
              sel.innerHTML += `<option value="${c.ClassID}">${c.ClassName || c.ClassID}</option>`;
            });
          } else {
            // ครูเห็นเฉพาะห้องประจำชั้นตัวเอง (AssignedClass)
            const myClass = user.assignedClass ? String(user.assignedClass).trim() : '';
            if (!myClass) {
              // ไม่มีห้องประจำชั้น = ไม่มีสิทธิ์เช็คชื่อ Homeroom
              sel.innerHTML = '<option value="">- ไม่มีห้องประจำชั้น -</option>';
              sel.disabled = true;
              document.getElementById('studentList').innerHTML =
                '<div class="text-center text-sm text-slate-400 py-8">คุณไม่ได้เป็นครูประจำชั้น<br/>หากต้องการเช็คชื่อรายวิชา ไปที่เมนู "เช็คชื่อรายคาบ"</div>';
              return;
            }
            const myCls = data.data.find(c => String(c.ClassID).trim() === myClass);
            const clsName = myCls ? (myCls.ClassName || myCls.ClassID) : myClass;
            // ล็อกเป็นห้องตัวเอง เลือกอื่นไม่ได้
            sel.innerHTML = `<option value="${myClass}">${clsName}</option>`;
            sel.disabled = true;
            // โหลดนักเรียนห้องตัวเองทันที
            loadStudents();
          }
        }
      } catch (err) {
        document.getElementById('classSelect').innerHTML = '<option>โหลดห้องไม่สำเร็จ</option>';
      }
    }

    // โหลดรายชื่อนักเรียนในห้อง
    async function loadStudents() {
      const classId = document.getElementById('classSelect').value;
      if (!classId) { alert('กรุณาเลือกห้องเรียน'); return; }

      const list = document.getElementById('studentList');
      list.innerHTML = `<div class="text-center py-8"><span style="display:inline-block;width:28px;height:28px;border:3px solid #e2e8f0;border-top-color:#185FA5;border-radius:50%;animation:spin 0.7s linear infinite;"></span><p class="text-xs text-slate-400 mt-2">กำลังโหลดข้อมูล...</p></div>`;

      try {
        // ดึงรายชื่อ + การเช็คชื่อที่บันทึกไว้ พร้อมกัน
        const [sRes, aRes] = await Promise.all([
          fetch(API_URL + '?action=getStudentsByClass&classId=' + encodeURIComponent(classId)),
          fetch(API_URL + '?action=getAttendance&classId=' + encodeURIComponent(classId) + '&date=' + today + '&period=homeroom')
        ]);
        const sData = await sRes.json();
        const aData = await aRes.json();

        if (!sData.success) throw new Error(sData.error || 'โหลดรายชื่อไม่สำเร็จ');

        students = sData.data;
        attendance = {};

        // โหลดสถานะที่เคยบันทึกไว้
        if (aData.success && aData.data) {
          Object.keys(aData.data).forEach(sid => {
            attendance[sid] = aData.data[sid].status;
          });
        }

        renderStudents();
        document.getElementById('headerInfo').textContent =
          document.getElementById('classSelect').selectedOptions[0].text + ' · ' + dateStr;
        document.getElementById('countBadge').textContent = students.length + ' คน';
        document.getElementById('countBadge').classList.remove('hidden');
        document.getElementById('quickActions').classList.remove('hidden');
        document.getElementById('footer').classList.remove('hidden');
      } catch (err) {
        list.innerHTML = '<div class="text-center text-sm text-red-500 py-8"><i class="ti ti-alert-circle text-2xl block mb-2"></i>' + err.message + '</div>';
      }
    }

    // แสดงรายชื่อ
    function renderStudents() {
      const list = document.getElementById('studentList');
      if (!students.length) {
        list.innerHTML = '<div class="text-center text-sm text-slate-400 py-8">ไม่มีนักเรียนในห้องนี้</div>';
        return;
      }

      list.innerHTML = students.map(s => {
        const cur = attendance[s.studentId] || '';
        const btns = STATUSES.map(st => {
          const active = cur === st.key;
          const style = active
            ? `background:${st.color};color:#fff;border:none;`
            : `background:var(--color-background-secondary,#f1f5f9);color:${st.textColor};border:0.5px solid #e2e8f0;`;
          return `<button onclick="setStatus('${s.studentId}','${st.key}')" class="status-btn text-[10px] px-2 py-1.5 rounded" style="${style}">${st.label}</button>`;
        }).join('');

        const initial = s.number || '?';
        return `
          <div class="flex items-center gap-3 p-3 border border-slate-100 rounded-lg">
            <div class="w-9 h-9 rounded-full bg-blue-50 text-[#185FA5] flex items-center justify-center text-xs font-medium flex-shrink-0">${initial}</div>
            <div class="flex-1 min-w-0">
              <p class="text-sm font-medium truncate">${s.prefix}${s.firstName} ${s.lastName}</p>
              <p class="text-[10px] text-slate-500">${s.nickName || ''} · เลขที่ ${s.number}</p>
            </div>
            <div class="flex gap-1 flex-wrap justify-end">${btns}</div>
          </div>`;
      }).join('');
      updateSummary();
    }

    function setStatus(studentId, status) {
      attendance[studentId] = status;
      renderStudents();
    }

    function setAll(status) {
      students.forEach(s => attendance[s.studentId] = status);
      renderStudents();
    }

    function clearAll() {
      attendance = {};
      renderStudents();
    }

    function updateSummary() {
      const counts = {};
      STATUSES.forEach(s => counts[s.key] = 0);
      Object.values(attendance).forEach(st => { if (counts[st] !== undefined) counts[st]++; });
      document.getElementById('summary').innerHTML = STATUSES.map(s =>
        `<span style="color:${s.textColor}">${s.label} ${counts[s.key]}</span>`
      ).join('');
    }

    async function saveAttendance() {
      const classId = document.getElementById('classSelect').value;
      const records = students.map(s => ({
        studentId: s.studentId,
        status: attendance[s.studentId] || 'absent',
        note: ''
      }));

      const btn = document.getElementById('saveBtn');
      const txt = document.getElementById('saveText');
      btn.disabled = true;
      txt.textContent = 'กำลังบันทึก...';

      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({
            action: 'saveAttendance',
            classId: classId,
            date: today,
            period: 'homeroom',
            records: records,
            recordedBy: user.id
          })
        });
        const data = await res.json();
        if (data.success) {
          var lineMsg = data.lineSent ? '\n✓ ส่งแจ้งผู้ปกครองทาง LINE แล้ว' : '';
          alert('บันทึกการเช็คชื่อสำเร็จ ' + data.saved + ' คน' + lineMsg);
        } else {
          alert('บันทึกไม่สำเร็จ: ' + (data.error || ''));
        }
      } catch (err) {
        alert('เชื่อมต่อระบบไม่ได้');
      }
      btn.disabled = false;
      txt.textContent = 'บันทึก';
    }

    // ===== ส่งแจ้งผู้ปกครองแบบ manual =====
    async function sendNotify() {
      const classId = document.getElementById('classSelect').value;
      if (!classId) { alert('เลือกห้องก่อน'); return; }
      if (!confirm('ส่งสรุปการเช็คชื่อเข้ากลุ่ม LINE ผู้ปกครองห้องนี้?')) return;

      const btn = document.getElementById('notifyBtn');
      const txt = document.getElementById('notifyText');
      btn.disabled = true;
      txt.textContent = 'กำลังส่ง...';
      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({
            action: 'notifyClass',
            classId: classId,
            date: today,
            period: 'homeroom'
          })
        });
        const data = await res.json();
        alert(data.success ? '✓ ' + data.message : 'ส่งไม่สำเร็จ: ' + (data.error || ''));
      } catch (err) {
        alert('เชื่อมต่อระบบไม่ได้');
      }
      btn.disabled = false;
      txt.textContent = 'ส่งแจ้งผู้ปกครอง';
    }

    loadClasses();
  </script>


  <!-- Footer เครดิตผู้พัฒนา -->
  <footer class="py-5 text-center">
    <p class="text-[11px] text-slate-400">ผู้พัฒนา: นายชิติพัทธ์ นิลวรรณ · ตำแหน่ง ครู</p>
    <p class="text-[11px] text-slate-400">โรงเรียนบ้านละลม สพป.ศรีสะเกษ เขต 3</p>
  </footer>
</body>
</html>
