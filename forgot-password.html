<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ลืมรหัสผ่าน - โรงเรียนบ้านละลม</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.5.0/tabler-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
  <style> body { font-family: 'Sarabun', sans-serif; } </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-sm">
    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">

      <div class="bg-gradient-to-br from-[#042C53] to-[#185FA5] p-6 text-white text-center relative overflow-hidden">
        <div class="absolute -top-5 -right-5 w-24 h-24 bg-amber-400/15 rounded-full"></div>
        <div class="relative">
          <div class="w-12 h-12 bg-amber-400/20 text-amber-400 rounded-full flex items-center justify-center mx-auto mb-3">
            <i class="ti ti-key text-2xl"></i>
          </div>
          <h1 class="text-base font-medium">ลืมรหัสผ่าน</h1>
          <p id="stepLabel" class="text-xs text-blue-200 mt-1">กรอกข้อมูลเพื่อรับรหัส OTP</p>
        </div>
      </div>

      <div class="p-6">
        <div id="errorBox" class="hidden mb-4 p-3 bg-red-50 border border-red-200 rounded-lg flex items-center gap-2">
          <i class="ti ti-alert-circle text-red-500"></i>
          <span id="errorMsg" class="text-xs text-red-700"></span>
        </div>
        <div id="okBox" class="hidden mb-4 p-3 bg-green-50 border border-green-200 rounded-lg flex items-center gap-2">
          <i class="ti ti-circle-check text-green-600"></i>
          <span id="okMsg" class="text-xs text-green-700"></span>
        </div>

        <!-- STEP 1 -->
        <div id="step1">
          <label class="block text-xs font-medium text-slate-700 mb-1.5">รหัสประจำตัว</label>
          <input type="text" id="username" placeholder="เช่น HR-2024-001" class="w-full h-10 px-3 text-sm border border-slate-200 rounded-lg focus:border-[#185FA5] focus:ring-1 focus:ring-[#185FA5] outline-none mb-4 font-mono"/>
          <label class="block text-xs font-medium text-slate-700 mb-1.5">อีเมลที่ลงทะเบียน</label>
          <input type="email" id="email" placeholder="email@banlalom.ac.th" class="w-full h-10 px-3 text-sm border border-slate-200 rounded-lg focus:border-[#185FA5] focus:ring-1 focus:ring-[#185FA5] outline-none mb-5"/>
          <button id="reqBtn" onclick="requestOTP()" class="w-full py-2.5 bg-[#185FA5] hover:bg-[#0C447C] text-white rounded-lg text-sm font-medium transition flex items-center justify-center gap-2">
            <i class="ti ti-mail-forward"></i> <span id="reqText">ส่ง OTP ไปอีเมล</span>
          </button>
        </div>

        <!-- STEP 2 -->
        <div id="step2" class="hidden">
          <label class="block text-xs font-medium text-slate-700 mb-1.5">รหัส OTP (จากอีเมล)</label>
          <input type="text" id="otp" maxlength="6" placeholder="000000" class="w-full h-11 px-3 text-lg text-center tracking-[0.5em] font-mono border border-slate-200 rounded-lg focus:border-[#185FA5] focus:ring-1 focus:ring-[#185FA5] outline-none mb-4"/>
          <label class="block text-xs font-medium text-slate-700 mb-1.5">รหัสผ่านใหม่</label>
          <input type="password" id="newPass" placeholder="อย่างน้อย 6 ตัวอักษร" class="w-full h-10 px-3 text-sm border border-slate-200 rounded-lg focus:border-[#185FA5] focus:ring-1 focus:ring-[#185FA5] outline-none mb-5"/>
          <button id="confirmBtn" onclick="confirmReset()" class="w-full py-2.5 bg-[#1D9E75] hover:bg-[#0F6E56] text-white rounded-lg text-sm font-medium transition flex items-center justify-center gap-2">
            <i class="ti ti-check"></i> <span id="confirmText">ตั้งรหัสผ่านใหม่</span>
          </button>
        </div>

        <p class="text-center text-xs text-slate-400 mt-4">
          <a href="login.html" class="text-[#185FA5] hover:underline"><i class="ti ti-arrow-left text-xs"></i> กลับไปหน้าเข้าสู่ระบบ</a>
        </p>
      </div>

    </div>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbyZB1sqZKu_--r5_mwf9RCJm4u9cTjzrOMToh_ULv22lw81oRZ3U9if0YxkV_nNhWhesw/exec';
    let currentUsername = '';

    function showError(msg) {
      document.getElementById('okBox').classList.add('hidden');
      document.getElementById('errorBox').classList.remove('hidden');
      document.getElementById('errorMsg').textContent = msg;
    }
    function showOk(msg) {
      document.getElementById('errorBox').classList.add('hidden');
      document.getElementById('okBox').classList.remove('hidden');
      document.getElementById('okMsg').textContent = msg;
    }

    async function requestOTP() {
      const username = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value.trim();
      const btn = document.getElementById('reqBtn');
      const txt = document.getElementById('reqText');

      if (!username || !email) { showError('กรุณากรอกข้อมูลให้ครบ'); return; }

      btn.disabled = true;
      txt.textContent = 'กำลังส่ง...';

      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'requestReset', username, email })
        });
        const data = await res.json();
        if (data.success) {
          currentUsername = username;
          showOk('ส่ง OTP ไปยังอีเมลแล้ว กรุณาตรวจสอบกล่องจดหมาย');
          document.getElementById('step1').classList.add('hidden');
          document.getElementById('step2').classList.remove('hidden');
          document.getElementById('stepLabel').textContent = 'กรอก OTP และตั้งรหัสผ่านใหม่';
        } else {
          showError(data.error || 'ส่ง OTP ไม่สำเร็จ');
          btn.disabled = false;
          txt.textContent = 'ส่ง OTP ไปอีเมล';
        }
      } catch (err) {
        showError('เชื่อมต่อระบบไม่ได้');
        btn.disabled = false;
        txt.textContent = 'ส่ง OTP ไปอีเมล';
      }
    }

    async function confirmReset() {
      const otp = document.getElementById('otp').value.trim();
      const newPass = document.getElementById('newPass').value;
      const btn = document.getElementById('confirmBtn');
      const txt = document.getElementById('confirmText');

      if (!otp || !newPass) { showError('กรุณากรอก OTP และรหัสผ่านใหม่'); return; }
      if (newPass.length < 6) { showError('รหัสผ่านใหม่ต้องมีอย่างน้อย 6 ตัวอักษร'); return; }

      btn.disabled = true;
      txt.textContent = 'กำลังตั้งรหัส...';

      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'confirmReset', username: currentUsername, otp, newPassword: newPass })
        });
        const data = await res.json();
        if (data.success) {
          alert('รีเซ็ตรหัสผ่านสำเร็จ! กรุณาเข้าสู่ระบบด้วยรหัสใหม่');
          window.location.href = 'login.html';
        } else {
          showError(data.error || 'รีเซ็ตไม่สำเร็จ');
          btn.disabled = false;
          txt.textContent = 'ตั้งรหัสผ่านใหม่';
        }
      } catch (err) {
        showError('เชื่อมต่อระบบไม่ได้');
        btn.disabled = false;
        txt.textContent = 'ตั้งรหัสผ่านใหม่';
      }
    }
  </script>

</body>
</html>
