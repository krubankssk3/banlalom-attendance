<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ลงทะเบียนใบหน้า - โรงเรียนบ้านละลม</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.5.0/tabler-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
  <style> body { font-family: 'Sarabun', sans-serif; } video { transform: scaleX(-1); } </style>
</head>
<body class="bg-slate-50 min-h-screen">

  <div class="max-w-lg mx-auto p-4">

    <a href="admin.html" class="inline-flex items-center gap-1 text-xs text-slate-500 hover:text-slate-700 mb-3">
      <i class="ti ti-arrow-left"></i> กลับ Dashboard
    </a>

    <div class="bg-white rounded-2xl border border-slate-100 overflow-hidden">

      <div class="bg-gradient-to-br from-[#534AB7] to-[#3C3489] p-4 text-white">
        <p class="text-base font-medium"><i class="ti ti-face-id"></i> ลงทะเบียนใบหน้า</p>
        <p class="text-xs text-purple-100 mt-1">เก็บใบหน้านักเรียนไว้ใช้เช็คชื่อ</p>
      </div>

      <!-- เตือน PDPA -->
      <div class="p-3 bg-amber-50 border-b border-amber-100">
        <p class="text-[11px] text-amber-800"><i class="ti ti-shield-lock"></i> ต้องได้รับความยินยอมจากผู้ปกครองก่อนเก็บใบหน้านักเรียน</p>
      </div>

      <!-- เลือกห้อง + นักเรียน -->
      <div class="p-4 border-b border-slate-100">
        <div class="grid grid-cols-2 gap-2 mb-2">
          <div>
            <label class="block text-[10px] text-slate-500 mb-1">ห้อง</label>
            <select id="classSelect" onchange="loadStudents()" class="w-full h-9 px-2 text-xs border border-slate-200 rounded outline-none">
              <option value="">-- เลือกห้อง --</option>
            </select>
          </div>
          <div>
            <label class="block text-[10px] text-slate-500 mb-1">นักเรียน</label>
            <select id="studentSelect" class="w-full h-9 px-2 text-xs border border-slate-200 rounded outline-none">
              <option value="">-- เลือกนักเรียน --</option>
            </select>
          </div>
        </div>
      </div>

      <!-- โหมดถ่าย -->
      <div class="p-4">
        <div class="flex gap-1.5 bg-slate-100 rounded-lg p-1 mb-3">
          <button id="modeCam" onclick="switchMode('cam')" class="flex-1 py-2 rounded-md text-xs font-medium bg-white text-[#534AB7]">📷 ถ่ายสด</button>
          <button id="modeUpload" onclick="switchMode('upload')" class="flex-1 py-2 rounded-md text-xs font-medium text-slate-500">📁 อัปโหลดรูป</button>
        </div>

        <!-- กล้องสด -->
        <div id="camMode">
          <div class="relative bg-slate-900 rounded-lg overflow-hidden mb-2" style="aspect-ratio: 4/3;">
            <video id="video" autoplay playsinline class="w-full h-full object-cover"></video>
            <canvas id="canvas" class="hidden"></canvas>
          </div>
          <button id="captureBtn" onclick="capturePhoto()" class="w-full h-10 bg-[#534AB7] text-white rounded-lg text-sm font-medium">
            <i class="ti ti-camera"></i> ถ่ายรูป
          </button>
        </div>

        <!-- อัปโหลด -->
        <div id="uploadMode" class="hidden">
          <label class="block border-2 border-dashed border-slate-200 rounded-lg p-6 text-center cursor-pointer hover:border-[#534AB7]">
            <input type="file" id="fileInput" accept="image/*" class="hidden" onchange="handleFile(event)"/>
            <i class="ti ti-photo-up text-3xl text-slate-300"></i>
            <p class="text-xs text-slate-500 mt-2">กดเลือกรูป หรือลากรูปมาวาง</p>
          </label>
        </div>

        <!-- พรีวิวรูปที่เลือก -->
        <div id="preview" class="hidden mt-3">
          <p class="text-xs text-slate-500 mb-2">รูปที่จะลงทะเบียน:</p>
          <img id="previewImg" class="w-32 h-32 object-cover rounded-lg mx-auto border border-slate-200"/>
          <button id="registerBtn" onclick="registerFace()" class="w-full h-10 mt-3 bg-[#1D9E75] text-white rounded-lg text-sm font-medium">
            <i class="ti ti-check"></i> ลงทะเบียนใบหน้า
          </button>
        </div>

        <div id="result" class="hidden mt-3 p-2 rounded text-xs"></div>
      </div>

      <!-- รายชื่อ + สถานะ -->
      <div class="p-4 border-t border-slate-100">
        <p class="text-xs text-slate-500 mb-2">สถานะการลงทะเบียน</p>
        <div id="statusList" class="space-y-1.5">
          <div class="text-center text-xs text-slate-400 py-4">เลือกห้องเพื่อดูสถานะ</div>
        </div>
      </div>

    </div>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbyZB1sqZKu_--r5_mwf9RCJm4u9cTjzrOMToh_ULv22lw81oRZ3U9if0YxkV_nNhWhesw/exec';
    const user = JSON.parse(localStorage.getItem('banlalom_user') || '{}');
    if (!user.id) window.location.href = 'login.html';

    let capturedImage = null;
    let stream = null;

    async function loadClasses() {
      try {
        const res = await fetch(API_URL + '?action=getClasses');
        const data = await res.json();
        if (data.success) {
          document.getElementById('classSelect').innerHTML = '<option value="">-- เลือกห้อง --</option>' +
            data.data.map(c => `<option value="${c.ClassID}">${c.ClassName || c.ClassID}</option>`).join('');
        }
      } catch (err) {}
    }

    async function loadStudents() {
      const classId = document.getElementById('classSelect').value;
      if (!classId) return;
      try {
        const res = await fetch(API_URL + '?action=getFaceStatus&classId=' + encodeURIComponent(classId));
        const data = await res.json();
        if (data.success) {
          document.getElementById('studentSelect').innerHTML = '<option value="">-- เลือกนักเรียน --</option>' +
            data.data.map(s => `<option value="${s.studentId}">${s.prefix}${s.firstName} ${s.lastName}${s.registered ? ' ✓' : ''}</option>`).join('');
          renderStatus(data.data);
        }
      } catch (err) {}
    }

    function renderStatus(students) {
      const list = document.getElementById('statusList');
      if (!students.length) { list.innerHTML = '<div class="text-center text-xs text-slate-400 py-4">ไม่มีนักเรียน</div>'; return; }
      const done = students.filter(s => s.registered).length;
      list.innerHTML = `<p class="text-[10px] text-slate-400 mb-2">ลงทะเบียนแล้ว ${done}/${students.length} คน</p>` +
        students.map(s => `
          <div class="flex items-center justify-between p-2 border border-slate-100 rounded text-xs">
            <span>${s.number}. ${s.prefix}${s.firstName} ${s.lastName}</span>
            ${s.registered
              ? '<span class="text-[10px] text-green-600"><i class="ti ti-circle-check-filled"></i> แล้ว</span>'
              : '<span class="text-[10px] text-slate-400">ยัง</span>'}
          </div>`).join('');
    }

    // ----- สลับโหมด -----
    function switchMode(mode) {
      const cam = mode === 'cam';
      document.getElementById('camMode').classList.toggle('hidden', !cam);
      document.getElementById('uploadMode').classList.toggle('hidden', cam);
      document.getElementById('modeCam').className = 'flex-1 py-2 rounded-md text-xs font-medium ' + (cam ? 'bg-white text-[#534AB7]' : 'text-slate-500');
      document.getElementById('modeUpload').className = 'flex-1 py-2 rounded-md text-xs font-medium ' + (cam ? 'text-slate-500' : 'bg-white text-[#534AB7]');
      if (cam) startCamera(); else stopCamera();
    }

    // ----- กล้อง -----
    async function startCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
        document.getElementById('video').srcObject = stream;
      } catch (err) {
        alert('เปิดกล้องไม่ได้: ' + err.message);
      }
    }
    function stopCamera() {
      if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
    }

    function capturePhoto() {
      const video = document.getElementById('video');
      resizeToBase64FromSource(video, video.videoWidth, video.videoHeight, (img) => {
        capturedImage = img;
        showPreview(img);
      });
    }

    // ----- อัปโหลด -----
    function handleFile(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        const tempImg = new Image();
        tempImg.onload = () => {
          resizeToBase64FromSource(tempImg, tempImg.width, tempImg.height, (img) => {
            capturedImage = img;
            showPreview(img);
          });
        };
        tempImg.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    // ===== ย่อรูปให้กว้างไม่เกิน 640px (ใบหน้ายังชัด ไฟล์เล็กลงมาก) =====
    function resizeToBase64FromSource(source, srcW, srcH, callback) {
      const maxW = 640;
      let w = srcW, h = srcH;
      if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
      const canvas = document.getElementById('canvas');
      canvas.width = w;
      canvas.height = h;
      canvas.getContext('2d').drawImage(source, 0, 0, w, h);
      callback(canvas.toDataURL('image/jpeg', 0.85));
    }

    function showPreview(img) {
      document.getElementById('previewImg').src = img;
      document.getElementById('preview').classList.remove('hidden');
    }

    // ----- ลงทะเบียน -----
    async function registerFace() {
      const studentId = document.getElementById('studentSelect').value;
      if (!studentId) { alert('เลือกนักเรียนก่อน'); return; }
      if (!capturedImage) { alert('ถ่ายรูปหรือเลือกรูปก่อน'); return; }

      const btn = document.getElementById('registerBtn');
      const result = document.getElementById('result');
      btn.disabled = true; btn.innerHTML = 'กำลังประมวลผล...';
      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'registerFace', studentId: studentId, imageBase64: capturedImage })
        });
        const data = await res.json();
        result.classList.remove('hidden');
        if (data.success) {
          result.className = 'mt-3 p-2 rounded text-xs bg-green-50 text-green-700';
          result.textContent = '✓ ' + data.message;
          document.getElementById('preview').classList.add('hidden');
          capturedImage = null;
          loadStudents();
        } else {
          result.className = 'mt-3 p-2 rounded text-xs bg-red-50 text-red-700';
          result.textContent = data.error || 'ลงทะเบียนไม่สำเร็จ';
        }
      } catch (err) {
        result.classList.remove('hidden');
        result.className = 'mt-3 p-2 rounded text-xs bg-red-50 text-red-700';
        result.textContent = 'เชื่อมต่อระบบไม่ได้';
      }
      btn.disabled = false; btn.innerHTML = '<i class="ti ti-check"></i> ลงทะเบียนใบหน้า';
    }

    loadClasses();
    startCamera();
  </script>

</body>
</html>
