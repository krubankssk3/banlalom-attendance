<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เช็คชื่อด้วยใบหน้า - โรงเรียนบ้านละลม</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.5.0/dist/tabler-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
  <style> body { font-family: 'Sarabun', sans-serif; } video { transform: scaleX(-1); } </style>
</head>
<body class="bg-slate-50 min-h-screen">

  <div class="max-w-lg mx-auto p-4">

    <a href="admin.html" class="inline-flex items-center gap-1 text-xs text-slate-500 hover:text-slate-700 mb-3">
      <i class="ti ti-arrow-left"></i> กลับ Dashboard
    </a>

    <div class="bg-white rounded-2xl border border-slate-100 overflow-hidden">

      <div class="bg-gradient-to-br from-[#534AB7] to-[#3C3489] p-4 text-white">
        <p class="text-base font-medium"><i class="ti ti-scan-eye"></i> เช็คชื่อด้วยใบหน้า</p>
        <p class="text-xs text-purple-100 mt-1">ส่องกล้องที่หน้านักเรียน ระบบจะรู้เอง</p>
      </div>

      <!-- เลือกห้อง + คาบ -->
      <div class="p-4 border-b border-slate-100">
        <div class="grid grid-cols-2 gap-2">
          <div>
            <label class="block text-[10px] text-slate-500 mb-1">ห้อง</label>
            <select id="classSelect" onchange="loadPeriods()" class="w-full h-9 px-2 text-xs border border-slate-200 rounded outline-none">
              <option value="">-- เลือกห้อง --</option>
            </select>
          </div>
          <div>
            <label class="block text-[10px] text-slate-500 mb-1">คาบ</label>
            <select id="periodSelect" class="w-full h-9 px-2 text-xs border border-slate-200 rounded outline-none">
              <option value="homeroom">Homeroom</option>
            </select>
          </div>
        </div>
      </div>

      <!-- กล้อง -->
      <div class="p-4">
        <div class="relative bg-slate-900 rounded-lg overflow-hidden mb-3" style="aspect-ratio: 4/3;">
          <video id="video" autoplay playsinline class="w-full h-full object-cover"></video>
        </div>
        <canvas id="canvas" class="hidden"></canvas>

        <button id="autoBtn" onclick="toggleAuto()" class="w-full h-12 bg-[#1D9E75] hover:bg-[#0F6E56] text-white rounded-lg text-base font-medium mb-2">
          <i class="ti ti-scan"></i> <span id="autoText">เริ่มสแกนอัตโนมัติ</span>
        </button>
        <button id="scanBtn" onclick="scanFace()" class="w-full h-11 bg-[#534AB7] hover:bg-[#3C3489] text-white rounded-lg text-sm font-medium">
          <i class="ti ti-camera"></i> ถ่ายเช็คชื่อ (กดเอง)
        </button>

        <!-- ผลลัพธ์ -->
        <div id="result" class="hidden mt-3"></div>
      </div>

      <!-- รายชื่อที่เช็คแล้ววันนี้ -->
      <div class="p-4 border-t border-slate-100">
        <div class="flex items-center justify-between mb-2">
          <p class="text-xs text-slate-500">เช็คชื่อแล้ววันนี้ (<span id="checkedCount">0</span> คน)</p>
          <button onclick="sendNotify()" class="text-xs text-[#06C755] flex items-center gap-1"><i class="ti ti-brand-line"></i> ส่งสรุปเข้ากลุ่ม</button>
        </div>
        <div id="checkedList" class="space-y-1.5"></div>
      </div>

    </div>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbyZB1sqZKu_--r5_mwf9RCJm4u9cTjzrOMToh_ULv22lw81oRZ3U9if0YxkV_nNhWhesw/exec';
    const user = JSON.parse(localStorage.getItem('banlalom_user') || '{}');
    if (!user.id) window.location.href = 'login.html';

    const today = new Date().toISOString().slice(0, 10);
    let stream = null;
    let checkedToday = [];

    async function loadClasses() {
      try {
        // ครูเห็นเฉพาะห้องที่เกี่ยวข้อง / แอดมินเห็นหมด
        const res = await fetch(API_URL + '?action=getMyClasses&teacherId=' + encodeURIComponent(user.id));
        const data = await res.json();
        if (data.success) {
          document.getElementById('classSelect').innerHTML = '<option value="">-- เลือกห้อง --</option>' +
            data.data.map(c => `<option value="${c.classId}">${c.className}</option>`).join('');
        }
      } catch (err) {}
    }

    async function startCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
        document.getElementById('video').srcObject = stream;
      } catch (err) {
        alert('เปิดกล้องไม่ได้: ' + err.message);
      }
    }

    let isScanning = false;  // กันยิงซ้อน
    let lastCheckedId = null; // กันจับคนเดิมซ้ำติดๆ

    async function scanFace(auto) {
      const classId = document.getElementById('classSelect').value;
      const period = document.getElementById('periodSelect').value;
      if (!classId) { if (!auto) alert('เลือกห้องก่อน'); return; }
      if (isScanning) return;  // กำลังตรวจอยู่ ข้าม
      isScanning = true;

      const video = document.getElementById('video');
      const canvas = document.getElementById('canvas');
      // ย่อรูปให้กว้างไม่เกิน 640px (ใบหน้าชัดพอ ไฟล์เล็ก ส่งเร็ว)
      let w = video.videoWidth, h = video.videoHeight;
      const maxW = 640;
      if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
      canvas.width = w;
      canvas.height = h;
      canvas.getContext('2d').drawImage(video, 0, 0, w, h);
      const image = canvas.toDataURL('image/jpeg', 0.85);

      const btn = document.getElementById('scanBtn');
      const result = document.getElementById('result');
      if (!auto) {
        btn.disabled = true; btn.innerHTML = 'กำลังตรวจ...';
        result.classList.remove('hidden');
        result.innerHTML = '<div class="p-3 bg-slate-50 rounded-lg text-center text-xs text-slate-500">กำลังตรวจใบหน้า...</div>';
      }

      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'scanFace', imageBase64: image, classId: classId, date: today, period: period })
        });
        const data = await res.json();
        if (data.success) {
          const s = data.student;
          // โหมด auto: ถ้าจับคนเดิมที่เพิ่งเช็ค ให้เงียบ (ไม่บี๊บ/ไม่ขึ้นซ้ำ)
          if (auto && s.studentId === lastCheckedId) {
            isScanning = false;
            return;
          }
          lastCheckedId = s.studentId;
          result.classList.remove('hidden');
          result.innerHTML = `
            <div class="p-3 bg-green-50 border border-green-200 rounded-lg text-center">
              <i class="ti ti-circle-check-filled text-2xl text-[#1D9E75]"></i>
              <p class="text-sm font-medium text-green-800 mt-1">${s.name} ${s.nickName ? '('+s.nickName+')' : ''}</p>
              <p class="text-[11px] text-green-600">เลขที่ ${s.number} · ความมั่นใจ ${data.confidence}%</p>
              <p class="text-[11px] mt-1 ${data.alreadyChecked ? 'text-amber-600' : 'text-green-700'}">
                ${data.alreadyChecked ? '⚠ เช็คชื่อไปแล้ว' : '✓ บันทึกมาเรียนแล้ว'}
              </p>
            </div>`;
          // เพิ่มในรายการ (ถ้ายังไม่มี)
          if (!checkedToday.find(c => c.studentId === s.studentId)) {
            checkedToday.unshift(s);
            renderChecked();
          }
          // เสียงบี๊บ
          beep();
        } else {
          // โหมด auto: ไม่เจอหน้า/ไม่ชัด ให้เงียบ (ไม่รบกวน รอเฟรมถัดไป)
          if (auto) { isScanning = false; return; }
          result.innerHTML = `
            <div class="p-3 bg-red-50 border border-red-200 rounded-lg text-center">
              <i class="ti ti-alert-circle text-2xl text-[#E24B4A]"></i>
              <p class="text-sm text-red-700 mt-1">${data.error}</p>
            </div>`;
        }
      } catch (err) {
        if (!auto) result.innerHTML = '<div class="p-3 bg-red-50 rounded-lg text-center text-xs text-red-700">เชื่อมต่อระบบไม่ได้</div>';
      }
      if (!auto) { btn.disabled = false; btn.innerHTML = '<i class="ti ti-camera"></i> ถ่ายเช็คชื่อ (กดเอง)'; }
      isScanning = false;
    }

    // ===== โหมดสแกนอัตโนมัติ (ทุก 3 วินาที) =====
    let autoTimer = null;
    function toggleAuto() {
      const classId = document.getElementById('classSelect').value;
      if (!classId) { alert('เลือกห้องก่อน'); return; }
      if (autoTimer) {
        // ปิด
        clearInterval(autoTimer); autoTimer = null;
        document.getElementById('autoText').textContent = 'เริ่มสแกนอัตโนมัติ';
        document.getElementById('autoBtn').className = 'w-full h-12 bg-[#1D9E75] hover:bg-[#0F6E56] text-white rounded-lg text-base font-medium mb-2';
      } else {
        // เปิด - สแกนทุก 3 วินาที
        autoTimer = setInterval(() => scanFace(true), 3000);
        document.getElementById('autoText').textContent = '⏸ หยุดสแกนอัตโนมัติ';
        document.getElementById('autoBtn').className = 'w-full h-12 bg-[#E24B4A] hover:bg-[#C13838] text-white rounded-lg text-base font-medium mb-2';
        scanFace(true); // เริ่มทันที
      }
    }
    // ปิด timer เมื่อออกจากหน้า
    window.addEventListener('beforeunload', () => { if (autoTimer) clearInterval(autoTimer); });

    function renderChecked() {
      document.getElementById('checkedCount').textContent = checkedToday.length;
      document.getElementById('checkedList').innerHTML = checkedToday.map(s => `
        <div class="flex items-center gap-2 p-2 border border-slate-100 rounded text-xs">
          <i class="ti ti-circle-check-filled text-[#1D9E75]"></i>
          <span>${s.number}. ${s.name}</span>
        </div>`).join('');
    }

    function beep() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        osc.frequency.value = 880;
        osc.connect(ctx.destination);
        osc.start(); osc.stop(ctx.currentTime + 0.1);
      } catch (e) {}
    }

    // ===== ส่งสรุปเข้ากลุ่ม LINE =====
    async function sendNotify() {
      const classId = document.getElementById('classSelect').value;
      const period = document.getElementById('periodSelect').value;
      if (!classId) { alert('เลือกห้องก่อน'); return; }
      if (!confirm('ส่งสรุปการเช็คชื่อเข้ากลุ่ม LINE ผู้ปกครอง?')) return;
      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'notifyClass', classId: classId, date: today, period: period })
        });
        const data = await res.json();
        alert(data.success ? '✓ ' + data.message : 'ส่งไม่สำเร็จ: ' + (data.error || ''));
      } catch (err) { alert('เชื่อมต่อระบบไม่ได้'); }
    }

    // ===== ดึงคาบที่สอนในห้องนี้ (จากตารางสอน) =====
    async function loadPeriods() {
      const classId = document.getElementById('classSelect').value;
      const sel = document.getElementById('periodSelect');
      sel.innerHTML = '<option value="homeroom">Homeroom</option>';
      if (!classId) return;
      try {
        // ดึงตารางสอนของครู (แอดมินดึงทั้งหมด)
        let url = API_URL + '?action=getSchedule';
        if (user.role !== 'Admin' && user.role) url += '&teacherId=' + encodeURIComponent(user.id);
        const res = await fetch(url);
        const data = await res.json();
        if (data.success) {
          // เฉพาะคาบของห้องนี้
          const periods = data.data.filter(s => String(s.classId).trim() === String(classId).trim());
          const DAYS = { '1':'จ.','2':'อ.','3':'พ.','4':'พฤ.','5':'ศ.' };
          periods.forEach(p => {
            sel.innerHTML += `<option value="${p.period}">คาบ ${p.period} · ${p.subjectName} (${DAYS[String(p.dayOfWeek)]||''})</option>`;
          });
        }
      } catch (err) {}
    }

    loadClasses();
    startCamera();
  </script>


  <!-- Footer เครดิตผู้พัฒนา -->
  <footer class="py-5 text-center">
    <p class="text-[11px] text-slate-400">ผู้พัฒนา: นายชิติพัทธ์ นิลวรรณ · ตำแหน่ง ครู</p>
    <p class="text-[11px] text-slate-400">โรงเรียนบ้านละลม สพป.ศรีสะเกษ เขต 3</p>
  </footer>
</body>
</html>
