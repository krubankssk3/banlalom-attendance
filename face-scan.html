<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เช็คชื่อด้วยใบหน้า - โรงเรียนบ้านละลม</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.5.0/tabler-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
  <style> body { font-family: 'Sarabun', sans-serif; } video { transform: scaleX(-1); } </style>
</head>
<body class="bg-slate-50 min-h-screen">

  <div class="max-w-lg mx-auto p-4">

    <a href="admin.html" class="inline-flex items-center gap-1 text-xs text-slate-500 hover:text-slate-700 mb-3">
      <i class="ti ti-arrow-left"></i> กลับ Dashboard
    </a>

    <div class="bg-white rounded-2xl border border-slate-100 overflow-hidden">

      <div class="bg-gradient-to-br from-[#534AB7] to-[#3C3489] p-4 text-white">
        <p class="text-base font-medium"><i class="ti ti-scan-eye"></i> เช็คชื่อด้วยใบหน้า</p>
        <p class="text-xs text-purple-100 mt-1">ส่องกล้องที่หน้านักเรียน ระบบจะรู้เอง</p>
      </div>

      <!-- เลือกห้อง + คาบ -->
      <div class="p-4 border-b border-slate-100">
        <div class="grid grid-cols-2 gap-2">
          <div>
            <label class="block text-[10px] text-slate-500 mb-1">ห้อง</label>
            <select id="classSelect" class="w-full h-9 px-2 text-xs border border-slate-200 rounded outline-none">
              <option value="">-- เลือกห้อง --</option>
            </select>
          </div>
          <div>
            <label class="block text-[10px] text-slate-500 mb-1">คาบ</label>
            <select id="periodSelect" class="w-full h-9 px-2 text-xs border border-slate-200 rounded outline-none">
              <option value="homeroom">หน้าเสาธง</option>
              <option value="1">คาบ 1</option><option value="2">คาบ 2</option>
              <option value="3">คาบ 3</option><option value="4">คาบ 4</option>
              <option value="5">คาบ 5</option><option value="6">คาบ 6</option>
            </select>
          </div>
        </div>
      </div>

      <!-- กล้อง -->
      <div class="p-4">
        <div class="relative bg-slate-900 rounded-lg overflow-hidden mb-3" style="aspect-ratio: 4/3;">
          <video id="video" autoplay playsinline class="w-full h-full object-cover"></video>
        </div>
        <canvas id="canvas" class="hidden"></canvas>

        <button id="scanBtn" onclick="scanFace()" class="w-full h-12 bg-[#534AB7] hover:bg-[#3C3489] text-white rounded-lg text-base font-medium">
          <i class="ti ti-camera"></i> ถ่ายเช็คชื่อ
        </button>

        <!-- ผลลัพธ์ -->
        <div id="result" class="hidden mt-3"></div>
      </div>

      <!-- รายชื่อที่เช็คแล้ววันนี้ -->
      <div class="p-4 border-t border-slate-100">
        <p class="text-xs text-slate-500 mb-2">เช็คชื่อแล้ววันนี้ (<span id="checkedCount">0</span> คน)</p>
        <div id="checkedList" class="space-y-1.5"></div>
      </div>

    </div>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbyZB1sqZKu_--r5_mwf9RCJm4u9cTjzrOMToh_ULv22lw81oRZ3U9if0YxkV_nNhWhesw/exec';
    const user = JSON.parse(localStorage.getItem('banlalom_user') || '{}');
    if (!user.id) window.location.href = 'login.html';

    const today = new Date().toISOString().slice(0, 10);
    let stream = null;
    let checkedToday = [];

    async function loadClasses() {
      try {
        const res = await fetch(API_URL + '?action=getClasses');
        const data = await res.json();
        if (data.success) {
          document.getElementById('classSelect').innerHTML = '<option value="">-- เลือกห้อง --</option>' +
            data.data.map(c => `<option value="${c.ClassID}">${c.ClassName || c.ClassID}</option>`).join('');
        }
      } catch (err) {}
    }

    async function startCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
        document.getElementById('video').srcObject = stream;
      } catch (err) {
        alert('เปิดกล้องไม่ได้: ' + err.message);
      }
    }

    async function scanFace() {
      const classId = document.getElementById('classSelect').value;
      const period = document.getElementById('periodSelect').value;
      if (!classId) { alert('เลือกห้องก่อน'); return; }

      const video = document.getElementById('video');
      const canvas = document.getElementById('canvas');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext('2d').drawImage(video, 0, 0);
      const image = canvas.toDataURL('image/jpeg', 0.8);

      const btn = document.getElementById('scanBtn');
      const result = document.getElementById('result');
      btn.disabled = true; btn.innerHTML = 'กำลังตรวจ...';
      result.classList.remove('hidden');
      result.innerHTML = '<div class="p-3 bg-slate-50 rounded-lg text-center text-xs text-slate-500">กำลังตรวจใบหน้า...</div>';

      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'scanFace', imageBase64: image, classId: classId, date: today, period: period })
        });
        const data = await res.json();
        if (data.success) {
          const s = data.student;
          result.innerHTML = `
            <div class="p-3 bg-green-50 border border-green-200 rounded-lg text-center">
              <i class="ti ti-circle-check-filled text-2xl text-[#1D9E75]"></i>
              <p class="text-sm font-medium text-green-800 mt-1">${s.name} ${s.nickName ? '('+s.nickName+')' : ''}</p>
              <p class="text-[11px] text-green-600">เลขที่ ${s.number} · ความมั่นใจ ${data.confidence}%</p>
              <p class="text-[11px] mt-1 ${data.alreadyChecked ? 'text-amber-600' : 'text-green-700'}">
                ${data.alreadyChecked ? '⚠ เช็คชื่อไปแล้ว' : '✓ บันทึกมาเรียนแล้ว'}
              </p>
            </div>`;
          // เพิ่มในรายการ (ถ้ายังไม่มี)
          if (!checkedToday.find(c => c.studentId === s.studentId)) {
            checkedToday.unshift(s);
            renderChecked();
          }
          // เสียงบี๊บ
          beep();
        } else {
          result.innerHTML = `
            <div class="p-3 bg-red-50 border border-red-200 rounded-lg text-center">
              <i class="ti ti-alert-circle text-2xl text-[#E24B4A]"></i>
              <p class="text-sm text-red-700 mt-1">${data.error}</p>
            </div>`;
        }
      } catch (err) {
        result.innerHTML = '<div class="p-3 bg-red-50 rounded-lg text-center text-xs text-red-700">เชื่อมต่อระบบไม่ได้</div>';
      }
      btn.disabled = false; btn.innerHTML = '<i class="ti ti-camera"></i> ถ่ายเช็คชื่อ';
    }

    function renderChecked() {
      document.getElementById('checkedCount').textContent = checkedToday.length;
      document.getElementById('checkedList').innerHTML = checkedToday.map(s => `
        <div class="flex items-center gap-2 p-2 border border-slate-100 rounded text-xs">
          <i class="ti ti-circle-check-filled text-[#1D9E75]"></i>
          <span>${s.number}. ${s.name}</span>
        </div>`).join('');
    }

    function beep() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        osc.frequency.value = 880;
        osc.connect(ctx.destination);
        osc.start(); osc.stop(ctx.currentTime + 0.1);
      } catch (e) {}
    }

    loadClasses();
    startCamera();
  </script>

</body>
</html>
