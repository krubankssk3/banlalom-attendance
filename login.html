<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เข้าสู่ระบบ - โรงเรียนบ้านละลม</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.5.0/tabler-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Sarabun', sans-serif; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-3xl">
    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden grid md:grid-cols-2">

      <!-- ฝั่งซ้าย: Brand -->
      <div class="bg-gradient-to-br from-[#042C53] to-[#185FA5] p-8 text-white relative overflow-hidden flex flex-col justify-center">
        <div class="absolute -top-8 -right-8 w-32 h-32 bg-amber-400/15 rounded-full"></div>
        <div class="absolute -bottom-10 left-6 w-24 h-24 bg-amber-400/10 rounded-full"></div>
        <div class="relative">
          <div class="w-12 h-12 bg-amber-400 text-[#042C53] rounded-xl flex items-center justify-center mb-4">
            <i class="ti ti-school text-2xl"></i>
          </div>
          <h1 class="text-xl font-medium">โรงเรียนบ้านละลม</h1>
          <p class="text-amber-400 text-sm font-medium mt-1">ระบบเช็คชื่อนักเรียน</p>
          <p class="text-blue-200 text-xs mt-4 leading-relaxed">เข้าสู่ระบบเพื่อจัดการการเช็คชื่อ ดูรายงาน และจัดการข้อมูลนักเรียน</p>
        </div>
      </div>

      <!-- ฝั่งขวา: Form -->
      <div class="p-8">
        <h2 class="text-lg font-medium text-slate-800">เข้าสู่ระบบ</h2>
        <p class="text-xs text-slate-500 mt-1 mb-5">สำหรับครูและผู้ดูแลระบบ</p>

        <!-- กล่อง error -->
        <div id="errorBox" class="hidden mb-4 p-3 bg-red-50 border border-red-200 rounded-lg flex items-center gap-2">
          <i class="ti ti-alert-circle text-red-500"></i>
          <span id="errorMsg" class="text-xs text-red-700"></span>
        </div>

        <!-- รหัสประจำตัว -->
        <label class="block text-xs font-medium text-slate-700 mb-1.5">
          <i class="ti ti-id text-[#185FA5]"></i> รหัสประจำตัว
        </label>
        <input type="text" id="username" placeholder="เช่น HR-2024-001"
          class="w-full h-10 px-3 text-sm border border-slate-200 rounded-lg focus:border-[#185FA5] focus:ring-1 focus:ring-[#185FA5] outline-none mb-4 font-mono"/>

        <!-- รหัสผ่าน -->
        <label class="block text-xs font-medium text-slate-700 mb-1.5">
          <i class="ti ti-lock text-[#185FA5]"></i> รหัสผ่าน
        </label>
        <div class="relative mb-2">
          <input type="password" id="password" placeholder="••••••••"
            class="w-full h-10 px-3 pr-10 text-sm border border-slate-200 rounded-lg focus:border-[#185FA5] focus:ring-1 focus:ring-[#185FA5] outline-none"/>
          <button type="button" onclick="togglePassword()" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600">
            <i id="eyeIcon" class="ti ti-eye"></i>
          </button>
        </div>

        <div class="flex items-center justify-between mb-5">
          <label class="flex items-center gap-1.5 cursor-pointer">
            <input type="checkbox" id="remember" class="w-3.5 h-3.5"/>
            <span class="text-xs text-slate-500">จดจำการเข้าสู่ระบบ</span>
          </label>
        </div>

        <!-- ปุ่ม -->
        <button id="loginBtn" onclick="doLogin()"
          class="w-full py-2.5 bg-[#185FA5] hover:bg-[#0C447C] text-white rounded-lg text-sm font-medium transition flex items-center justify-center gap-2">
          <i class="ti ti-login"></i> <span id="btnText">เข้าสู่ระบบ</span>
        </button>

        <p class="text-center text-[10px] text-slate-400 mt-4 leading-relaxed">
          หากเข้าสู่ระบบครั้งแรก รหัสผ่านคือรหัสประจำตัวของคุณ<br/>
          กรุณาเปลี่ยนรหัสผ่านทันทีหลังเข้าระบบ
        </p>
      </div>

    </div>
  </div>

  <script>
    // ⚠️ เปลี่ยนเป็น Apps Script URL ของคุณ
    const API_URL = 'https://script.google.com/macros/s/AKfycbz7e82Ljkk3opgF9BKunnSh14LA2oKcQq33Aa2sydk7Zl2zXSCZgmpmwOdyjsyOrqlf5Q/exec';

    function togglePassword() {
      const input = document.getElementById('password');
      const icon = document.getElementById('eyeIcon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'ti ti-eye-off';
      } else {
        input.type = 'password';
        icon.className = 'ti ti-eye';
      }
    }

    function showError(msg) {
      document.getElementById('errorBox').classList.remove('hidden');
      document.getElementById('errorMsg').textContent = msg;
    }

    function hideError() {
      document.getElementById('errorBox').classList.add('hidden');
    }

    async function doLogin() {
      hideError();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      const btnText = document.getElementById('btnText');

      if (!username || !password) {
        showError('กรุณากรอกรหัสประจำตัวและรหัสผ่าน');
        return;
      }

      // แสดงสถานะกำลังโหลด
      btn.disabled = true;
      btnText.textContent = 'กำลังเข้าสู่ระบบ...';

      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({
            action: 'login',
            username: username,
            password: password
          })
        });
        const data = await res.json();

        if (data.success) {
          // เก็บ session ใน localStorage
          localStorage.setItem('banlalom_token', data.token);
          localStorage.setItem('banlalom_user', JSON.stringify(data.user));
          // ===== เพิ่มบล็อกนี้ =====
        if (data.mustChangePassword) {
            window.location.href = 'change-password.html';
            return;
          }
          // ========================
          // ไปยัง Dashboard ตาม role
          const role = data.user.role;
          if (role === 'Admin') {
            window.location.href = 'admin.html';
          } else if (role === 'Homeroom') {
            window.location.href = 'homeroom.html';
          } else if (role === 'Subject') {
            window.location.href = 'subject.html';
          } else {
            window.location.href = 'dashboard.html';
          }
        } else {
          showError(data.error || 'เข้าสู่ระบบไม่สำเร็จ');
          btn.disabled = false;
          btnText.textContent = 'เข้าสู่ระบบ';
        }
      } catch (err) {
        showError('เชื่อมต่อระบบไม่ได้ กรุณาลองใหม่');
        btn.disabled = false;
        btnText.textContent = 'เข้าสู่ระบบ';
      }
    }

    // กด Enter เพื่อ login
    document.getElementById('password').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') doLogin();
    });

    // ถ้า login อยู่แล้ว ข้ามไป dashboard
    if (localStorage.getItem('banlalom_token')) {
      const user = JSON.parse(localStorage.getItem('banlalom_user') || '{}');
      // ถ้าต้องการให้ข้ามอัตโนมัติ uncomment บรรทัดล่าง
      // window.location.href = 'dashboard.html';
    }
  </script>

</body>
</html>
