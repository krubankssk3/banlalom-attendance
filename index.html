<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>โรงเรียนบ้านละลม - ทดสอบระบบ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.5.0/tabler-icons.min.css">
  <style>
    body { font-family: 'Sarabun', sans-serif; }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-md">
    <!-- การ์ดหลัก -->
    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">

      <!-- Header -->
      <div class="bg-gradient-to-br from-[#042C53] to-[#185FA5] p-6 text-white text-center relative overflow-hidden">
        <div class="absolute -top-8 -right-8 w-32 h-32 bg-amber-400/15 rounded-full"></div>
        <div class="relative">
          <div class="w-14 h-14 bg-white/15 rounded-full flex items-center justify-center mx-auto mb-3">
            <i class="ti ti-school text-3xl"></i>
          </div>
          <h1 class="text-lg font-medium">โรงเรียนบ้านละลม</h1>
          <p class="text-xs text-blue-200 mt-1">ทดสอบการเชื่อมต่อระบบ</p>
        </div>
      </div>

      <!-- เนื้อหา -->
      <div class="p-6">
        <div class="flex items-center gap-2 mb-4">
          <i class="ti ti-plug-connected text-[#185FA5]"></i>
          <h2 class="text-sm font-medium text-slate-700">สถานะการเชื่อมต่อ Backend</h2>
        </div>

        <!-- กล่องสถานะ -->
        <div id="status" class="rounded-lg p-4 mb-4 bg-slate-50 border border-slate-200">
          <div class="flex items-center gap-3">
            <div class="w-3 h-3 rounded-full bg-slate-300 animate-pulse"></div>
            <span class="text-sm text-slate-500">กำลังเชื่อมต่อ...</span>
          </div>
        </div>

        <!-- ผลลัพธ์ -->
        <div id="result" class="hidden rounded-lg p-3 mb-4 text-xs font-mono bg-slate-900 text-green-400 overflow-x-auto"></div>

        <!-- ปุ่มทดสอบ -->
        <button onclick="testConnection()" class="w-full py-2.5 bg-[#185FA5] hover:bg-[#0C447C] text-white rounded-lg text-sm font-medium transition flex items-center justify-center gap-2">
          <i class="ti ti-refresh"></i> ทดสอบอีกครั้ง
        </button>

        <p class="text-center text-xs text-slate-400 mt-4">
          ระบบเช็คชื่อนักเรียน v1.0
        </p>
      </div>

    </div>
  </div>

  <script>
    // ===================================================
    // ⚠️ สำคัญ: เปลี่ยน URL นี้เป็น Apps Script URL ของคุณ
    // (URL ที่ copy มาตอน Deploy Web App)
    // ===================================================
    const API_URL = 'https://script.google.com/macros/s/วาง_URL_ของคุณตรงนี้/exec';

    async function testConnection() {
      const statusEl = document.getElementById('status');
      const resultEl = document.getElementById('result');

      // แสดงสถานะกำลังโหลด
      statusEl.className = 'rounded-lg p-4 mb-4 bg-slate-50 border border-slate-200';
      statusEl.innerHTML = `
        <div class="flex items-center gap-3">
          <div class="w-3 h-3 rounded-full bg-amber-400 animate-pulse"></div>
          <span class="text-sm text-slate-500">กำลังเชื่อมต่อ...</span>
        </div>`;
      resultEl.classList.add('hidden');

      try {
        const res = await fetch(API_URL + '?action=ping');
        const data = await res.json();

        if (data.success) {
          // สำเร็จ
          statusEl.className = 'rounded-lg p-4 mb-4 bg-green-50 border border-green-200';
          statusEl.innerHTML = `
            <div class="flex items-center gap-3">
              <div class="w-8 h-8 rounded-full bg-green-500 flex items-center justify-center">
                <i class="ti ti-check text-white"></i>
              </div>
              <div>
                <p class="text-sm font-medium text-green-800">เชื่อมต่อสำเร็จ!</p>
                <p class="text-xs text-green-600">${data.message}</p>
              </div>
            </div>`;
          resultEl.classList.remove('hidden');
          resultEl.textContent = JSON.stringify(data, null, 2);
        } else {
          throw new Error(data.error || 'เกิดข้อผิดพลาด');
        }
      } catch (err) {
        // ล้มเหลว
        statusEl.className = 'rounded-lg p-4 mb-4 bg-red-50 border border-red-200';
        statusEl.innerHTML = `
          <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-full bg-red-500 flex items-center justify-center">
              <i class="ti ti-x text-white"></i>
            </div>
            <div>
              <p class="text-sm font-medium text-red-800">เชื่อมต่อไม่สำเร็จ</p>
              <p class="text-xs text-red-600">${err.message}</p>
            </div>
          </div>`;
        resultEl.classList.remove('hidden');
        resultEl.className = 'rounded-lg p-3 mb-4 text-xs font-mono bg-slate-900 text-red-400 overflow-x-auto';
        resultEl.textContent = 'ตรวจสอบ:\n1. วาง API_URL ถูกต้องไหม\n2. Deploy แบบ Anyone ไหม\n3. มี /exec ต่อท้ายไหม\n\nError: ' + err.message;
      }
    }

    // ทดสอบทันทีเมื่อเปิดหน้า
    testConnection();
  </script>

</body>
</html>
