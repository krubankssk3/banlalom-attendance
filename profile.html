<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>โปรไฟล์ - โรงเรียนบ้านละลม</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.5.0/tabler-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
  <style> body { font-family: 'Sarabun', sans-serif; } </style>
</head>
<body class="bg-slate-50 min-h-screen">

  <div class="max-w-lg mx-auto p-4">

    <a href="admin.html" class="inline-flex items-center gap-1 text-xs text-slate-500 hover:text-slate-700 mb-3">
      <i class="ti ti-arrow-left"></i> กลับ Dashboard
    </a>

    <!-- การ์ดโปรไฟล์ -->
    <div class="bg-white rounded-2xl border border-slate-100 overflow-hidden mb-4">
      <div class="bg-gradient-to-br from-[#042C53] to-[#185FA5] p-5 text-white text-center">
        <div id="avatar" class="w-16 h-16 rounded-full bg-[#EF9F27] text-[#042C53] flex items-center justify-center text-2xl font-medium mx-auto mb-2">-</div>
        <p id="pName" class="text-lg font-medium">...</p>
        <p id="pRole" class="text-xs text-blue-200 mt-0.5">...</p>
      </div>

      <!-- ข้อมูล -->
      <div class="p-4 space-y-3">
        <div class="flex items-center gap-3 p-2.5 bg-slate-50 rounded-lg">
          <i class="ti ti-id text-[#185FA5]"></i>
          <div class="flex-1">
            <p class="text-[10px] text-slate-400">รหัสประจำตัว</p>
            <p id="pId" class="text-sm font-mono">...</p>
          </div>
        </div>
        <div class="flex items-center gap-3 p-2.5 bg-slate-50 rounded-lg">
          <i class="ti ti-home text-[#185FA5]"></i>
          <div class="flex-1">
            <p class="text-[10px] text-slate-400">ห้องประจำชั้น</p>
            <p id="pClass" class="text-sm">...</p>
          </div>
        </div>

        <!-- แก้ไขได้: อีเมล -->
        <div>
          <label class="block text-xs font-medium text-slate-700 mb-1.5"><i class="ti ti-mail text-[#185FA5]"></i> อีเมล (ใช้สำหรับลืมรหัสผ่าน)</label>
          <input type="email" id="pEmail" class="w-full h-10 px-3 text-sm border border-slate-200 rounded-lg outline-none focus:border-[#185FA5]"/>
        </div>
        <!-- แก้ไขได้: เบอร์ -->
        <div>
          <label class="block text-xs font-medium text-slate-700 mb-1.5"><i class="ti ti-phone text-[#185FA5]"></i> เบอร์โทร</label>
          <input type="tel" id="pPhone" class="w-full h-10 px-3 text-sm border border-slate-200 rounded-lg outline-none focus:border-[#185FA5]"/>
        </div>

        <div id="saveResult" class="hidden p-2 rounded text-xs"></div>
        <button id="saveBtn" onclick="saveProfile()" class="w-full h-10 bg-[#1D9E75] hover:bg-[#0F6E56] text-white rounded-lg text-sm font-medium">
          <i class="ti ti-device-floppy"></i> บันทึกข้อมูล
        </button>
      </div>
    </div>

    <!-- การ์ดเปลี่ยนรหัส -->
    <div class="bg-white rounded-2xl border border-slate-100 p-4">
      <p class="text-sm font-medium text-slate-700 mb-3"><i class="ti ti-lock text-[#185FA5]"></i> เปลี่ยนรหัสผ่าน</p>

      <div id="pwError" class="hidden mb-3 p-2 bg-red-50 border border-red-200 rounded text-xs text-red-700"></div>
      <div id="pwSuccess" class="hidden mb-3 p-2 bg-green-50 border border-green-200 rounded text-xs text-green-700"></div>

      <div class="space-y-2">
        <input type="password" id="oldPw" placeholder="รหัสผ่านเดิม" class="w-full h-10 px-3 text-sm border border-slate-200 rounded-lg outline-none focus:border-[#185FA5]"/>
        <input type="password" id="newPw" placeholder="รหัสผ่านใหม่ (อย่างน้อย 6 ตัว)" class="w-full h-10 px-3 text-sm border border-slate-200 rounded-lg outline-none focus:border-[#185FA5]"/>
        <input type="password" id="confirmPw" placeholder="ยืนยันรหัสผ่านใหม่" class="w-full h-10 px-3 text-sm border border-slate-200 rounded-lg outline-none focus:border-[#185FA5]"/>
      </div>
      <button id="pwBtn" onclick="changePassword()" class="w-full h-10 mt-3 bg-[#185FA5] hover:bg-[#0C447C] text-white rounded-lg text-sm font-medium">
        เปลี่ยนรหัสผ่าน
      </button>
    </div>

  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbyZB1sqZKu_--r5_mwf9RCJm4u9cTjzrOMToh_ULv22lw81oRZ3U9if0YxkV_nNhWhesw/exec';
    const user = JSON.parse(localStorage.getItem('banlalom_user') || '{}');
    if (!user.id) window.location.href = 'login.html';

    const ROLE_LABEL = { Admin: 'ผู้ดูแลระบบ', Homeroom: 'ครูประจำชั้น', Subject: 'ครูประจำวิชา' };

    async function loadProfile() {
      try {
        const res = await fetch(API_URL + '?action=getMyProfile&teacherId=' + encodeURIComponent(user.id));
        const data = await res.json();
        if (data.success) {
          const p = data.profile;
          document.getElementById('avatar').textContent = (p.firstName || '?').charAt(0);
          document.getElementById('pName').textContent = p.prefix + p.firstName + ' ' + p.lastName;
          document.getElementById('pRole').textContent = ROLE_LABEL[p.role] || p.role;
          document.getElementById('pId').textContent = p.teacherId;
          document.getElementById('pClass').textContent = p.assignedClass || '-';
          document.getElementById('pEmail').value = p.email || '';
          document.getElementById('pPhone').value = p.phone || '';
        }
      } catch (err) {}
    }

    async function saveProfile() {
      const btn = document.getElementById('saveBtn');
      const result = document.getElementById('saveResult');
      btn.disabled = true; btn.textContent = 'กำลังบันทึก...';
      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({
            action: 'updateMyProfile',
            teacherId: user.id,
            email: document.getElementById('pEmail').value.trim(),
            phone: document.getElementById('pPhone').value.trim()
          })
        });
        const data = await res.json();
        result.classList.remove('hidden');
        if (data.success) {
          result.className = 'p-2 rounded text-xs bg-green-50 text-green-700';
          result.textContent = '✓ บันทึกข้อมูลสำเร็จ';
        } else {
          result.className = 'p-2 rounded text-xs bg-red-50 text-red-700';
          result.textContent = data.error || 'บันทึกไม่สำเร็จ';
        }
      } catch (err) {
        result.classList.remove('hidden');
        result.className = 'p-2 rounded text-xs bg-red-50 text-red-700';
        result.textContent = 'เชื่อมต่อระบบไม่ได้';
      }
      btn.disabled = false; btn.innerHTML = '<i class="ti ti-device-floppy"></i> บันทึกข้อมูล';
    }

    async function changePassword() {
      const oldPw = document.getElementById('oldPw').value;
      const newPw = document.getElementById('newPw').value;
      const confirmPw = document.getElementById('confirmPw').value;
      const err = document.getElementById('pwError');
      const ok = document.getElementById('pwSuccess');
      err.classList.add('hidden'); ok.classList.add('hidden');

      if (!oldPw || !newPw || !confirmPw) { err.classList.remove('hidden'); err.textContent = 'กรุณากรอกให้ครบ'; return; }
      if (newPw.length < 6) { err.classList.remove('hidden'); err.textContent = 'รหัสใหม่ต้องอย่างน้อย 6 ตัว'; return; }
      if (newPw !== confirmPw) { err.classList.remove('hidden'); err.textContent = 'รหัสใหม่ทั้งสองช่องไม่ตรงกัน'; return; }

      const btn = document.getElementById('pwBtn');
      btn.disabled = true; btn.textContent = 'กำลังเปลี่ยน...';
      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({
            action: 'changePassword',
            username: user.id,
            oldPassword: oldPw,
            newPassword: newPw
          })
        });
        const data = await res.json();
        if (data.success) {
          ok.classList.remove('hidden');
          ok.textContent = '✓ เปลี่ยนรหัสผ่านสำเร็จ';
          document.getElementById('oldPw').value = '';
          document.getElementById('newPw').value = '';
          document.getElementById('confirmPw').value = '';
        } else {
          err.classList.remove('hidden');
          err.textContent = data.error || 'เปลี่ยนไม่สำเร็จ';
        }
      } catch (e) {
        err.classList.remove('hidden');
        err.textContent = 'เชื่อมต่อระบบไม่ได้';
      }
      btn.disabled = false; btn.textContent = 'เปลี่ยนรหัสผ่าน';
    }

    loadProfile();
  </script>

</body>
</html>
