<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เช็คชื่อรายคาบ - โรงเรียนบ้านละลม</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.5.0/tabler-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
  <style> body { font-family: 'Sarabun', sans-serif; } </style>
</head>
<body class="bg-slate-50 min-h-screen">

  <div class="max-w-2xl mx-auto p-4">

    <a href="admin.html" class="inline-flex items-center gap-1 text-xs text-slate-500 hover:text-slate-700 mb-3">
      <i class="ti ti-arrow-left"></i> กลับ Dashboard
    </a>

    <div class="bg-white rounded-2xl border border-slate-100 overflow-hidden">

      <div class="bg-gradient-to-br from-[#26215C] to-[#534AB7] p-4 text-white">
        <div class="flex items-center justify-between">
          <div>
            <p class="text-base font-medium">เช็คชื่อรายคาบ</p>
            <p id="headerInfo" class="text-xs text-indigo-200 mt-1">เลือกวิชาและคาบที่สอน</p>
          </div>
          <div id="countBadge" class="bg-amber-400/20 text-amber-400 px-3 py-1 rounded-full text-xs font-medium hidden">0 คน</div>
        </div>
      </div>

      <!-- เลือกวิชา + คาบ -->
      <div class="p-4 border-b border-slate-100">
        <div class="grid grid-cols-3 gap-2">
          <div class="col-span-2">
            <label class="block text-xs font-medium text-slate-700 mb-1.5">เลือกวิชา</label>
            <select id="subjectSelect" onchange="onSubjectChange()" class="w-full h-10 px-2 text-sm border border-slate-200 rounded-lg focus:border-[#534AB7] outline-none">
              <option value="">-- กำลังโหลด --</option>
            </select>
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-700 mb-1.5">คาบที่</label>
            <select id="periodSelect" class="w-full h-10 px-2 text-sm border border-slate-200 rounded-lg focus:border-[#534AB7] outline-none">
              <option value="1">คาบ 1</option>
              <option value="2">คาบ 2</option>
              <option value="3">คาบ 3</option>
              <option value="4">คาบ 4</option>
              <option value="5">คาบ 5</option>
              <option value="6">คาบ 6</option>
            </select>
          </div>
        </div>

        <div id="classHint" class="hidden mt-2 flex items-center gap-1.5 px-2.5 py-1.5 bg-indigo-50 rounded-md">
          <i class="ti ti-info-circle text-[#534AB7] text-sm"></i>
          <span class="text-xs text-indigo-900" id="classHintText"></span>
        </div>

        <button onclick="loadStudents()" class="w-full mt-3 h-10 bg-[#534AB7] hover:bg-[#3C3489] text-white rounded-lg text-sm font-medium">
          <i class="ti ti-search"></i> โหลดรายชื่อ
        </button>
      </div>

      <!-- ปุ่มลัด -->
      <div id="quickActions" class="p-3 px-4 bg-slate-50 flex gap-2 items-center flex-wrap hidden">
        <span class="text-xs text-slate-500 mr-1">ลัด:</span>
        <button onclick="setAll('present')" class="text-xs px-3 py-1.5 bg-[#1D9E75] text-white rounded-md"><i class="ti ti-checks"></i> มาทั้งหมด</button>
        <button onclick="clearAll()" class="text-xs px-3 py-1.5 bg-white text-slate-500 border border-slate-200 rounded-md">ล้างทั้งหมด</button>
      </div>

      <!-- รายชื่อ -->
      <div id="studentList" class="p-4 space-y-2">
        <div class="text-center text-sm text-slate-400 py-8">
          <i class="ti ti-book text-2xl block mb-2"></i>
          เลือกวิชาและคาบ แล้วกดโหลดรายชื่อ
        </div>
      </div>

      <!-- Footer -->
      <div id="footer" class="p-4 border-t border-slate-100 flex items-center justify-between hidden">
        <div id="summary" class="flex gap-3 text-xs flex-wrap"></div>
        <button id="saveBtn" onclick="saveAttendance()" class="text-sm px-6 py-2.5 bg-[#534AB7] hover:bg-[#3C3489] text-white rounded-lg font-medium">
          <i class="ti ti-device-floppy"></i> <span id="saveText">บันทึก</span>
        </button>
      </div>

    </div>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbyZB1sqZKu_--r5_mwf9RCJm4u9cTjzrOMToh_ULv22lw81oRZ3U9if0YxkV_nNhWhesw/exec';

    const user = JSON.parse(localStorage.getItem('banlalom_user') || '{}');
    if (!user.id) window.location.href = 'login.html';

    const STATUSES = [
      { key: 'present', label: 'มา', color: '#1D9E75', textColor: '#0F6E56' },
      { key: 'late', label: 'สาย', color: '#EF9F27', textColor: '#BA7517' },
      { key: 'leave_personal', label: 'ลากิจ', color: '#534AB7', textColor: '#3C3489' },
      { key: 'leave_sick', label: 'ลาป่วย', color: '#185FA5', textColor: '#185FA5' },
      { key: 'absent', label: 'ขาด', color: '#E24B4A', textColor: '#A32D2D' },
    ];

    let subjects = [];
    let students = [];
    let attendance = {};
    let currentClassId = '';
    const today = new Date().toISOString().slice(0, 10);

    // โหลดรายวิชาของครู
    async function loadSubjects() {
      try {
        const res = await fetch(API_URL + '?action=getSubjects&teacherId=' + encodeURIComponent(user.id));
        const data = await res.json();
        const sel = document.getElementById('subjectSelect');
        if (data.success && data.data.length) {
          sel.innerHTML = '<option value="">-- เลือกวิชา --</option>';
          subjects = data.data;
          subjects.forEach(s => {
            const tag = s.subjectGroup === 'activity' ? ' [กิจกรรม]' : '';
            sel.innerHTML += `<option value="${s.subjectId}">${s.subjectName} (${s.classId})${tag}</option>`;
          });
        } else {
          sel.innerHTML = '<option value="">ยังไม่มีวิชา - เพิ่มที่หน้าจัดการรายวิชา</option>';
        }
      } catch (err) {
        document.getElementById('subjectSelect').innerHTML = '<option value="">โหลดวิชาไม่สำเร็จ</option>';
      }
    }

    // เมื่อเลือกวิชา แสดงห้องที่จะเช็ค
    function onSubjectChange() {
      const subjectId = document.getElementById('subjectSelect').value;
      const subj = subjects.find(s => s.subjectId === subjectId);
      const hint = document.getElementById('classHint');
      if (subj && subj.classId) {
        currentClassId = subj.classId;
        document.getElementById('classHintText').innerHTML =
          'วิชานี้สอนห้อง <strong>' + subj.classId + '</strong> · ดึงรายชื่อห้องนี้อัตโนมัติ';
        hint.classList.remove('hidden');
      } else {
        hint.classList.add('hidden');
        currentClassId = '';
      }
    }

    async function loadStudents() {
      const subjectId = document.getElementById('subjectSelect').value;
      if (!subjectId) { alert('กรุณาเลือกวิชา'); return; }
      if (!currentClassId) { alert('วิชานี้ยังไม่ได้กำหนดห้องเรียน'); return; }

      const period = document.getElementById('periodSelect').value;
      const list = document.getElementById('studentList');
      list.innerHTML = '<div class="text-center text-sm text-slate-400 py-8"><i class="ti ti-loader animate-spin text-2xl block mb-2"></i> กำลังโหลด...</div>';

      try {
        const [sRes, aRes] = await Promise.all([
          fetch(API_URL + '?action=getStudentsByClass&classId=' + encodeURIComponent(currentClassId)),
          fetch(API_URL + '?action=getAttendance&classId=' + encodeURIComponent(currentClassId) + '&date=' + today + '&period=' + period)
        ]);
        const sData = await sRes.json();
        const aData = await aRes.json();

        if (!sData.success) throw new Error(sData.error || 'โหลดรายชื่อไม่สำเร็จ');

        students = sData.data;
        attendance = {};
        if (aData.success && aData.data) {
          Object.keys(aData.data).forEach(sid => { attendance[sid] = aData.data[sid].status; });
        }

        renderStudents();
        const subjName = document.getElementById('subjectSelect').selectedOptions[0].text;
        document.getElementById('headerInfo').textContent = subjName + ' · คาบ ' + period;
        document.getElementById('countBadge').textContent = students.length + ' คน';
        document.getElementById('countBadge').classList.remove('hidden');
        document.getElementById('quickActions').classList.remove('hidden');
        document.getElementById('footer').classList.remove('hidden');
      } catch (err) {
        list.innerHTML = '<div class="text-center text-sm text-red-500 py-8"><i class="ti ti-alert-circle text-2xl block mb-2"></i>' + err.message + '</div>';
      }
    }

    function renderStudents() {
      const list = document.getElementById('studentList');
      if (!students.length) {
        list.innerHTML = '<div class="text-center text-sm text-slate-400 py-8">ไม่มีนักเรียนในห้องนี้</div>';
        return;
      }
      list.innerHTML = students.map(s => {
        const cur = attendance[s.studentId] || '';
        const btns = STATUSES.map(st => {
          const active = cur === st.key;
          const style = active
            ? `background:${st.color};color:#fff;border:none;`
            : `background:#f1f5f9;color:${st.textColor};border:0.5px solid #e2e8f0;`;
          return `<button onclick="setStatus('${s.studentId}','${st.key}')" class="text-[10px] px-2 py-1.5 rounded" style="${style}">${st.label}</button>`;
        }).join('');
        return `
          <div class="flex items-center gap-3 p-3 border border-slate-100 rounded-lg">
            <div class="w-9 h-9 rounded-full bg-indigo-50 text-[#534AB7] flex items-center justify-center text-xs font-medium flex-shrink-0">${s.number || '?'}</div>
            <div class="flex-1 min-w-0">
              <p class="text-sm font-medium truncate">${s.prefix}${s.firstName} ${s.lastName}</p>
              <p class="text-[10px] text-slate-500">เลขที่ ${s.number}</p>
            </div>
            <div class="flex gap-1 flex-wrap justify-end">${btns}</div>
          </div>`;
      }).join('');
      updateSummary();
    }

    function setStatus(id, status) { attendance[id] = status; renderStudents(); }
    function setAll(status) { students.forEach(s => attendance[s.studentId] = status); renderStudents(); }
    function clearAll() { attendance = {}; renderStudents(); }

    function updateSummary() {
      const counts = {};
      STATUSES.forEach(s => counts[s.key] = 0);
      Object.values(attendance).forEach(st => { if (counts[st] !== undefined) counts[st]++; });
      document.getElementById('summary').innerHTML = STATUSES.map(s =>
        `<span style="color:${s.textColor}">${s.label} ${counts[s.key]}</span>`
      ).join('');
    }

    async function saveAttendance() {
      const subjectId = document.getElementById('subjectSelect').value;
      const period = document.getElementById('periodSelect').value;
      const records = students.map(s => ({
        studentId: s.studentId,
        status: attendance[s.studentId] || 'absent',
        note: ''
      }));

      const btn = document.getElementById('saveBtn');
      const txt = document.getElementById('saveText');
      btn.disabled = true;
      txt.textContent = 'กำลังบันทึก...';

      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({
            action: 'saveAttendance',
            classId: currentClassId,
            date: today,
            period: period,
            subjectId: subjectId,
            records: records,
            recordedBy: user.id
          })
        });
        const data = await res.json();
        if (data.success) {
          alert('บันทึกการเช็คชื่อสำเร็จ ' + data.saved + ' คน');
        } else {
          alert('บันทึกไม่สำเร็จ: ' + (data.error || ''));
        }
      } catch (err) {
        alert('เชื่อมต่อระบบไม่ได้');
      }
      btn.disabled = false;
      txt.textContent = 'บันทึก';
    }

    loadSubjects();
  </script>

</body>
</html>
