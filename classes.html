<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>จัดการห้องเรียน - โรงเรียนบ้านละลม</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.5.0/dist/tabler-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
  <style> body { font-family: 'Sarabun', sans-serif; } </style>
</head>
<body class="bg-slate-50 min-h-screen">

  <div class="max-w-2xl mx-auto p-4">

    <a href="admin.html" class="inline-flex items-center gap-1 text-xs text-slate-500 hover:text-slate-700 mb-3">
      <i class="ti ti-arrow-left"></i> กลับ Dashboard
    </a>

    <div class="bg-white rounded-2xl border border-slate-100 overflow-hidden">

      <div class="bg-gradient-to-br from-[#042C53] to-[#185FA5] p-4 text-white">
        <p class="text-base font-medium"><i class="ti ti-door"></i> จัดการห้องเรียน</p>
        <p class="text-xs text-blue-200 mt-1">เพิ่ม แก้ไข ลบ ห้องเรียน (สำหรับผู้ดูแลระบบ)</p>
      </div>

      <!-- ฟอร์มเพิ่ม/แก้ไข -->
      <div class="p-4 bg-slate-50 border-b border-slate-100">
        <p id="formTitle" class="text-xs font-medium text-[#185FA5] mb-3"><i class="ti ti-plus"></i> เพิ่มห้องเรียนใหม่</p>
        <div id="formError" class="hidden mb-3 p-2 bg-red-50 border border-red-200 rounded text-xs text-red-700"></div>

        <div class="grid grid-cols-2 gap-2 mb-2">
          <div>
            <label class="block text-[10px] text-slate-500 mb-1">รหัสห้อง <span class="text-red-400">*</span></label>
            <input type="text" id="classId" placeholder="เช่น P1-1, M2-1" class="w-full h-9 px-2 text-xs border border-slate-200 rounded outline-none"/>
          </div>
          <div>
            <label class="block text-[10px] text-slate-500 mb-1">ชื่อห้อง <span class="text-red-400">*</span></label>
            <input type="text" id="className" placeholder="เช่น ประถม 1/1" class="w-full h-9 px-2 text-xs border border-slate-200 rounded outline-none"/>
          </div>
        </div>
        <div class="grid grid-cols-3 gap-2 mb-2">
          <div>
            <label class="block text-[10px] text-slate-500 mb-1">ระดับชั้น</label>
            <input type="text" id="level" placeholder="เช่น ป.1, ม.2" class="w-full h-9 px-2 text-xs border border-slate-200 rounded outline-none"/>
          </div>
          <div>
            <label class="block text-[10px] text-slate-500 mb-1">ห้อง</label>
            <input type="text" id="room" placeholder="เช่น 1" class="w-full h-9 px-2 text-xs border border-slate-200 rounded outline-none"/>
          </div>
          <div>
            <label class="block text-[10px] text-slate-500 mb-1">ปีการศึกษา</label>
            <input type="text" id="academicYear" placeholder="เช่น 2569" class="w-full h-9 px-2 text-xs border border-slate-200 rounded outline-none"/>
          </div>
        </div>
        <div class="mb-3">
          <label class="block text-[10px] text-slate-500 mb-1">ครูประจำชั้น</label>
          <select id="homeroomTeacherId" class="w-full h-9 px-2 text-xs border border-slate-200 rounded outline-none">
            <option value="">-- ไม่ระบุ --</option>
          </select>
        </div>
        <div class="flex gap-2">
          <button id="saveBtn" onclick="saveClass()" class="flex-1 h-9 bg-[#1D9E75] text-white rounded-lg text-xs font-medium"><i class="ti ti-device-floppy"></i> บันทึก</button>
          <button id="cancelBtn" onclick="resetForm()" class="hidden px-4 h-9 bg-slate-200 text-slate-600 rounded-lg text-xs">ยกเลิก</button>
        </div>
      </div>

      <!-- รายการห้อง -->
      <div class="p-4">
        <p class="text-xs text-slate-500 mb-3">ห้องเรียนทั้งหมด (<span id="classCount">0</span> ห้อง)</p>
        <div id="classList" class="space-y-2">
          <div class="text-center text-xs text-slate-400 py-6">กำลังโหลด...</div>
        </div>
      </div>

    </div>
  </div>

  <footer class="py-5 text-center">
    <p class="text-[11px] text-slate-400">ผู้พัฒนา: นายชิติพัทธ์ นิลวรรณ · ตำแหน่ง ครู</p>
    <p class="text-[11px] text-slate-400">โรงเรียนบ้านละลม สพป.ศรีสะเกษ เขต 3</p>
  </footer>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbyZB1sqZKu_--r5_mwf9RCJm4u9cTjzrOMToh_ULv22lw81oRZ3U9if0YxkV_nNhWhesw/exec';
    const user = JSON.parse(localStorage.getItem('banlalom_user') || '{}');
    if (!user.id) window.location.href = 'login.html';
    // เฉพาะผู้ดูแลระบบ
    if (user.role && user.role !== 'Admin') {
      alert('หน้านี้สำหรับผู้ดูแลระบบเท่านั้น');
      window.location.href = 'admin.html';
    }

    let editing = null;

    async function loadTeachers() {
      try {
        const res = await fetch(API_URL + '?action=getTeachers');
        const data = await res.json();
        if (data.success) {
          document.getElementById('homeroomTeacherId').innerHTML = '<option value="">-- ไม่ระบุ --</option>' +
            data.data.map(t => `<option value="${t.TeacherID}">${(t.Prefix||'')}${t.FirstName} ${t.LastName}</option>`).join('');
        }
      } catch (err) {}
    }

    async function loadClasses() {
      const list = document.getElementById('classList');
      list.innerHTML = '<div class="text-center text-xs text-slate-400 py-6">กำลังโหลด...</div>';
      try {
        const res = await fetch(API_URL + '?action=getClassesManage');
        const data = await res.json();
        if (!data.success) throw new Error();

        document.getElementById('classCount').textContent = data.data.length;
        if (!data.data.length) {
          list.innerHTML = '<div class="text-center text-xs text-slate-400 py-6">ยังไม่มีห้องเรียน</div>';
          return;
        }

        list.innerHTML = data.data.map(c => `
          <div class="p-3 border border-slate-100 rounded-lg">
            <div class="flex items-center justify-between">
              <div>
                <p class="text-sm font-medium text-slate-800">${c.className} <span class="text-[10px] text-slate-400 font-normal">(${c.classId})</span></p>
                <p class="text-[11px] text-slate-500">
                  ${c.level ? c.level + ' · ' : ''}นักเรียน ${c.studentCount} คน
                  ${c.homeroomTeacherName ? ' · ครู' + c.homeroomTeacherName : ' · ยังไม่มีครูประจำชั้น'}
                </p>
              </div>
              <div class="flex gap-1.5 flex-shrink-0">
                <button class="edit-btn text-[#185FA5] border border-[#185FA5] px-2 py-1 rounded text-[11px] hover:bg-blue-50"
                  data-class='${JSON.stringify(c).replace(/'/g, "&#39;")}'><i class="ti ti-edit"></i></button>
                <button class="del-btn text-[#E24B4A] border border-[#E24B4A] px-2 py-1 rounded text-[11px] hover:bg-red-50"
                  data-id="${c.classId}" data-name="${c.className}" data-count="${c.studentCount}"><i class="ti ti-trash"></i></button>
              </div>
            </div>
          </div>`).join('');

        // ผูกปุ่มแก้/ลบ
        document.querySelectorAll('.edit-btn').forEach(btn => {
          btn.addEventListener('click', () => editClass(JSON.parse(btn.getAttribute('data-class').replace(/&#39;/g, "'"))));
        });
        document.querySelectorAll('.del-btn').forEach(btn => {
          btn.addEventListener('click', () => deleteClass(btn.getAttribute('data-id'), btn.getAttribute('data-name'), parseInt(btn.getAttribute('data-count'))));
        });
      } catch (err) {
        list.innerHTML = '<div class="text-center text-xs text-red-500 py-6">โหลดไม่สำเร็จ</div>';
      }
    }

    function editClass(c) {
      editing = c.classId;
      document.getElementById('classId').value = c.classId;
      document.getElementById('classId').disabled = true;
      document.getElementById('className').value = c.className || '';
      document.getElementById('level').value = c.level || '';
      document.getElementById('room').value = c.room || '';
      document.getElementById('academicYear').value = c.academicYear || '';
      document.getElementById('homeroomTeacherId').value = c.homeroomTeacherId || '';
      document.getElementById('formTitle').innerHTML = '<i class="ti ti-edit"></i> แก้ไขห้อง ' + c.className;
      document.getElementById('cancelBtn').classList.remove('hidden');
      window.scrollTo(0, 0);
    }

    function resetForm() {
      editing = null;
      ['classId','className','level','room','academicYear'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('homeroomTeacherId').value = '';
      document.getElementById('classId').disabled = false;
      document.getElementById('formTitle').innerHTML = '<i class="ti ti-plus"></i> เพิ่มห้องเรียนใหม่';
      document.getElementById('cancelBtn').classList.add('hidden');
      document.getElementById('formError').classList.add('hidden');
    }

    async function saveClass() {
      const classId = document.getElementById('classId').value.trim();
      const className = document.getElementById('className').value.trim();
      if (!classId) { showError('กรุณาระบุรหัสห้อง'); return; }
      if (!className) { showError('กรุณาระบุชื่อห้อง'); return; }

      const payload = {
        action: editing ? 'updateClass' : 'addClass',
        classId: classId,
        className: className,
        level: document.getElementById('level').value.trim(),
        room: document.getElementById('room').value.trim(),
        academicYear: document.getElementById('academicYear').value.trim(),
        homeroomTeacherId: document.getElementById('homeroomTeacherId').value
      };

      const btn = document.getElementById('saveBtn');
      btn.disabled = true; btn.innerHTML = 'กำลังบันทึก...';
      try {
        const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
        const data = await res.json();
        if (data.success) { resetForm(); loadClasses(); }
        else showError(data.error || 'บันทึกไม่สำเร็จ');
      } catch (err) { showError('เชื่อมต่อระบบไม่ได้'); }
      btn.disabled = false; btn.innerHTML = '<i class="ti ti-device-floppy"></i> บันทึก';
    }

    async function deleteClass(classId, className, count) {
      let msg = 'ลบห้อง ' + className + '?';
      if (count > 0) msg = 'ห้อง ' + className + ' มีนักเรียน ' + count + ' คน\\nหากลบ นักเรียนจะไม่มีห้องสังกัด\\n\\nยืนยันลบ?';
      if (!confirm(msg)) return;
      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'deleteClass', classId: classId, force: count > 0 })
        });
        const data = await res.json();
        if (data.success) loadClasses();
        else alert(data.error || 'ลบไม่สำเร็จ');
      } catch (err) { alert('เชื่อมต่อระบบไม่ได้'); }
    }

    function showError(msg) {
      const e = document.getElementById('formError');
      e.textContent = msg; e.classList.remove('hidden');
    }

    loadTeachers();
    loadClasses();
  </script>

</body>
</html>
