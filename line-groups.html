<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>จัดการกลุ่ม LINE - โรงเรียนบ้านละลม</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.5.0/tabler-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
  <style> body { font-family: 'Sarabun', sans-serif; } </style>
</head>
<body class="bg-slate-50 min-h-screen">

  <div class="max-w-2xl mx-auto p-4">

    <a href="admin.html" class="inline-flex items-center gap-1 text-xs text-slate-500 hover:text-slate-700 mb-3">
      <i class="ti ti-arrow-left"></i> กลับ Dashboard
    </a>

    <div class="bg-white rounded-2xl border border-slate-100 overflow-hidden">

      <div class="bg-gradient-to-br from-[#06C755] to-[#04A045] p-4 text-white">
        <p class="text-base font-medium"><i class="ti ti-brand-line"></i> จัดการกลุ่ม LINE</p>
        <p class="text-xs text-green-100 mt-1">ผูกกลุ่มผู้ปกครองกับห้องเรียน</p>
      </div>

      <!-- วิธีใช้ -->
      <div class="p-4 bg-green-50 border-b border-green-100">
        <p class="text-xs font-medium text-green-800 mb-2"><i class="ti ti-info-circle"></i> วิธีเพิ่มกลุ่ม</p>
        <ol class="text-[11px] text-green-700 space-y-1 list-decimal list-inside">
          <li>เชิญบอท "แจ้งเตือนมาเรียนละลม" เข้ากลุ่มผู้ปกครอง</li>
          <li>พิมพ์ "id" ในกลุ่ม → บอทจะจับกลุ่มอัตโนมัติ</li>
          <li>กลับมาหน้านี้ กดรีเฟรช → เลือกห้องให้กลุ่ม → บันทึก</li>
        </ol>
      </div>

      <!-- รายการกลุ่ม -->
      <div class="p-4">
        <div class="flex items-center justify-between mb-3">
          <p class="text-xs text-slate-500">กลุ่มที่บอทอยู่ (<span id="grpCount">0</span> กลุ่ม)</p>
          <button onclick="loadGroups()" class="text-xs text-[#185FA5] flex items-center gap-1"><i class="ti ti-refresh"></i> รีเฟรช</button>
        </div>
        <div id="groupList" class="space-y-2">
          <div class="text-center text-sm text-slate-400 py-6">กำลังโหลด...</div>
        </div>
      </div>

    </div>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbyZB1sqZKu_--r5_mwf9RCJm4u9cTjzrOMToh_ULv22lw81oRZ3U9if0YxkV_nNhWhesw/exec';
    const user = JSON.parse(localStorage.getItem('banlalom_user') || '{}');
    if (!user.id) window.location.href = 'login.html';

    let classes = [];

    async function loadClasses() {
      try {
        const res = await fetch(API_URL + '?action=getClasses');
        const data = await res.json();
        if (data.success) classes = data.data;
      } catch (err) {}
    }

    async function loadGroups() {
      const list = document.getElementById('groupList');
      list.innerHTML = '<div class="text-center text-sm text-slate-400 py-6">กำลังโหลด...</div>';
      try {
        const res = await fetch(API_URL + '?action=getLineGroups');
        const data = await res.json();
        if (!data.success) throw new Error('โหลดไม่สำเร็จ');

        document.getElementById('grpCount').textContent = data.data.length;
        if (!data.data.length) {
          list.innerHTML = '<div class="text-center text-sm text-slate-400 py-6"><i class="ti ti-users-group text-2xl block mb-2"></i>ยังไม่มีกลุ่ม<br/>เชิญบอทเข้ากลุ่มแล้วพิมพ์ "id" ก่อน</div>';
          return;
        }

        list.innerHTML = data.data.map((g, idx) => {
          const opts = '<option value="">-- เลือกห้อง --</option>' +
            classes.map(c => `<option value="${c.ClassID}" ${g.classId === c.ClassID ? 'selected' : ''}>${c.ClassName || c.ClassID}</option>`).join('');
          return `
            <div class="p-3 border border-slate-100 rounded-lg">
              <p class="text-[10px] text-slate-400 font-mono mb-2 truncate">${g.groupId}</p>
              <div class="flex gap-2">
                <input type="text" id="name-${idx}" value="${g.groupName || ''}" placeholder="ชื่อกลุ่ม (เช่น ผู้ปกครอง ม.1)" class="flex-1 h-9 px-2 text-xs border border-slate-200 rounded outline-none"/>
                <select id="class-${idx}" class="h-9 px-2 text-xs border border-slate-200 rounded outline-none">${opts}</select>
                <button onclick="linkGroup('${g.groupId}', ${idx})" class="px-3 h-9 text-xs bg-[#06C755] text-white rounded font-medium">บันทึก</button>
              </div>
              ${g.classId ? `<p class="text-[10px] text-green-600 mt-1.5"><i class="ti ti-check"></i> ผูกกับห้อง ${g.classId} แล้ว</p>` : '<p class="text-[10px] text-amber-600 mt-1.5">ยังไม่ได้ผูกห้อง</p>'}
            </div>`;
        }).join('');
      } catch (err) {
        list.innerHTML = '<div class="text-center text-sm text-red-500 py-6">' + err.message + '</div>';
      }
    }

    async function linkGroup(groupId, idx) {
      const classId = document.getElementById('class-' + idx).value;
      const groupName = document.getElementById('name-' + idx).value.trim();
      if (!classId) { alert('เลือกห้องก่อน'); return; }
      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'linkGroupClass', groupId: groupId, classId: classId, groupName: groupName })
        });
        const data = await res.json();
        if (data.success) { alert(data.message); loadGroups(); }
        else alert('ไม่สำเร็จ: ' + (data.error || ''));
      } catch (err) { alert('เชื่อมต่อระบบไม่ได้'); }
    }

    loadClasses().then(loadGroups);
  </script>

</body>
</html>
