<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เปลี่ยนรหัสผ่าน - โรงเรียนบ้านละลม</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.5.0/dist/tabler-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
  <style> body { font-family: 'Sarabun', sans-serif; } </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-sm">
    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">

      <div class="bg-gradient-to-br from-[#042C53] to-[#185FA5] p-6 text-white text-center relative overflow-hidden">
        <div class="absolute -top-5 -right-5 w-24 h-24 bg-amber-400/15 rounded-full"></div>
        <div class="relative">
          <div class="w-12 h-12 bg-amber-400/20 text-amber-400 rounded-full flex items-center justify-center mx-auto mb-3">
            <i class="ti ti-shield-lock text-2xl"></i>
          </div>
          <h1 class="text-base font-medium">เปลี่ยนรหัสผ่าน</h1>
          <p class="text-xs text-blue-200 mt-1">เพื่อความปลอดภัย กรุณาตั้งรหัสผ่านใหม่</p>
        </div>
      </div>

      <div class="p-6">
        <div id="firstTimeNote" class="mb-4 p-2.5 bg-amber-50 rounded-lg flex items-start gap-2">
          <i class="ti ti-info-circle text-amber-600 mt-0.5"></i>
          <p class="text-xs text-amber-800 leading-relaxed">นี่คือการเข้าสู่ระบบครั้งแรก กรุณาเปลี่ยนรหัสผ่านเริ่มต้นเป็นรหัสของคุณเอง</p>
        </div>

        <div id="errorBox" class="hidden mb-4 p-3 bg-red-50 border border-red-200 rounded-lg flex items-center gap-2">
          <i class="ti ti-alert-circle text-red-500"></i>
          <span id="errorMsg" class="text-xs text-red-700"></span>
        </div>

        <label class="block text-xs font-medium text-slate-700 mb-1.5">รหัสผ่านเดิม</label>
        <div class="relative mb-4">
          <input type="password" id="oldPass" class="w-full h-10 px-3 pr-10 text-sm border border-slate-200 rounded-lg focus:border-[#185FA5] focus:ring-1 focus:ring-[#185FA5] outline-none"/>
          <button type="button" onclick="togglePass('oldPass','eye1')" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600"><i id="eye1" class="ti ti-eye"></i></button>
        </div>

        <label class="block text-xs font-medium text-slate-700 mb-1.5">รหัสผ่านใหม่</label>
        <div class="relative mb-1.5">
          <input type="password" id="newPass" placeholder="อย่างน้อย 6 ตัวอักษร" oninput="checkStrength()" class="w-full h-10 px-3 pr-10 text-sm border border-slate-200 rounded-lg focus:border-[#185FA5] focus:ring-1 focus:ring-[#185FA5] outline-none"/>
          <button type="button" onclick="togglePass('newPass','eye2')" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600"><i id="eye2" class="ti ti-eye"></i></button>
        </div>
        <div class="h-1 bg-slate-100 rounded-full overflow-hidden mb-4">
          <div id="strengthBar" class="h-full w-0 transition-all"></div>
        </div>

        <label class="block text-xs font-medium text-slate-700 mb-1.5">ยืนยันรหัสผ่านใหม่</label>
        <div class="relative mb-5">
          <input type="password" id="confirmPass" placeholder="พิมพ์รหัสผ่านใหม่อีกครั้ง" class="w-full h-10 px-3 pr-10 text-sm border border-slate-200 rounded-lg focus:border-[#185FA5] focus:ring-1 focus:ring-[#185FA5] outline-none"/>
          <button type="button" onclick="togglePass('confirmPass','eye3')" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600"><i id="eye3" class="ti ti-eye"></i></button>
        </div>

        <button id="submitBtn" onclick="doChange()" class="w-full py-2.5 bg-[#185FA5] hover:bg-[#0C447C] text-white rounded-lg text-sm font-medium transition flex items-center justify-center gap-2">
          <i class="ti ti-check"></i> <span id="btnText">เปลี่ยนรหัสผ่าน</span>
        </button>
      </div>

    </div>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbyZB1sqZKu_--r5_mwf9RCJm4u9cTjzrOMToh_ULv22lw81oRZ3U9if0YxkV_nNhWhesw/exec';

    const user = JSON.parse(localStorage.getItem('banlalom_user') || '{}');
    if (!user.id) window.location.href = 'login.html';

    function togglePass(inputId, eyeId) {
      const input = document.getElementById(inputId);
      const eye = document.getElementById(eyeId);
      if (input.type === 'password') { input.type = 'text'; eye.className = 'ti ti-eye-off'; }
      else { input.type = 'password'; eye.className = 'ti ti-eye'; }
    }

    function checkStrength() {
      const val = document.getElementById('newPass').value;
      const bar = document.getElementById('strengthBar');
      let score = 0;
      if (val.length >= 6) score++;
      if (val.length >= 10) score++;
      if (/[A-Z]/.test(val) || /[0-9]/.test(val)) score++;
      const widths = ['0%', '33%', '66%', '100%'];
      const colors = ['', '#E24B4A', '#EF9F27', '#1D9E75'];
      bar.style.width = widths[score];
      bar.style.background = colors[score];
    }

    function showError(msg) {
      document.getElementById('errorBox').classList.remove('hidden');
      document.getElementById('errorMsg').textContent = msg;
    }

    async function doChange() {
      document.getElementById('errorBox').classList.add('hidden');
      const oldPass = document.getElementById('oldPass').value;
      const newPass = document.getElementById('newPass').value;
      const confirm = document.getElementById('confirmPass').value;
      const btn = document.getElementById('submitBtn');
      const btnText = document.getElementById('btnText');

      if (!oldPass || !newPass || !confirm) { showError('กรุณากรอกข้อมูลให้ครบ'); return; }
      if (newPass.length < 6) { showError('รหัสผ่านใหม่ต้องมีอย่างน้อย 6 ตัวอักษร'); return; }
      if (newPass !== confirm) { showError('รหัสผ่านใหม่ทั้งสองช่องไม่ตรงกัน'); return; }
      if (newPass === oldPass) { showError('รหัสผ่านใหม่ต้องไม่เหมือนรหัสเดิม'); return; }

      btn.disabled = true;
      btnText.textContent = 'กำลังเปลี่ยน...';

      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({
            action: 'changePassword',
            username: user.id,
            oldPassword: oldPass,
            newPassword: newPass
          })
        });
        const data = await res.json();
        if (data.success) {
          alert('เปลี่ยนรหัสผ่านสำเร็จ! กำลังเข้าสู่ระบบ');
          // ตอนนี้ทุก role ใช้ admin.html (Dashboard เดียว)
          window.location.href = 'admin.html';
        } else {
          showError(data.error || 'เปลี่ยนรหัสผ่านไม่สำเร็จ');
          btn.disabled = false;
          btnText.textContent = 'เปลี่ยนรหัสผ่าน';
        }
      } catch (err) {
        showError('เชื่อมต่อระบบไม่ได้');
        btn.disabled = false;
        btnText.textContent = 'เปลี่ยนรหัสผ่าน';
      }
    }
  </script>

</body>
</html>
